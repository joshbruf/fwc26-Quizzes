{week:2,day:10,type:'lesson',title:'Official Fleet Composition & T&Cs',tag:'Week 3 · Day 1',time:'~40 min',
why:'The official fleet is your primary operational tool. Before you can plan any movement, you need to know exactly what vehicles you have, how long you have them, and what the rules governing their use are.',
obj:['Know TBC and Host City fleet by country','Understand fleet availability windows and the override rule','Know the breakdown SLA and incident protocol'],
takes:['TBC USA/CAN: 1 bus + 2 minivans (Kia Carnival) + 2 SUVs. Mexico TBC: 1 bus + 0 minivans + 4 SUVs. No minivans in Mexico.','Host City fleet adds a <strong>Large Van (new for FWC26)</strong>: 15 passengers in USA/MEX, 12 in Canada. 1 minivan (not 2) in USA/CAN.','TBC light duty = 11 hrs/day. TBC bus = 15 hrs/day. All host city fleet = 15 hrs/day.','Override rule: fleet available for all official team movements even beyond scheduled hours. Unofficial movements outside hours require Rate Card.','<strong>Breakdown SLA: replacement vehicle within 1 hour</strong> of notification at no additional cost.','Any vehicle involved in an incident may only resume service after inspection and clearance by the FIFA26 Transport Representative — that means you document it and clear it.'],
quiz:[
{q:'Mexico TBC fleet has how many minivans?',opts:['1','2','3','0 — Mexico has no minivans'],ans:3,exp:'Mexico TBC = 1 bus + 0 minivans + 4 SUVs. USA/Canada TBC = 1 bus + 2 minivans + 2 SUVs. Mexico uses Hyundai Santa Fe / Kia Sorento as SUVs instead of Hyundai Palisade / Kia Telluride.'},
{q:'TBC light duty vehicles are available for how many continuous hours per day?',opts:['8 hours','11 hours','15 hours','20 hours'],ans:1,exp:'TBC light duty (SUVs and minivans) = 11 continuous hours/day. TBC team bus = 15 hours/day. All host city fleet = 15 hours/day.'},
{q:'What new vehicle type was added to the Host City fleet for FWC26?',opts:['Additional SUV','Armored vehicle','Large Van (15 passengers USA/MEX, 12 passengers Canada)','Second team bus'],ans:2,exp:'The Large Van is new for FWC26 — it does not exist in previous tournament setups. USA and Mexico = 15 passengers. Canada = 12 passengers. It only appears in the host city fleet, not the TBC fleet.'},
{q:'A breakdown replacement must be provided within:',opts:['30 minutes','1 hour','2 hours','4 hours'],ans:1,exp:'The breakdown SLA requires a replacement vehicle of equal or higher standard within 1 hour of notification at no additional cost to the client. This is a supplier obligation — you notify the depot, they provide the replacement.'},
{q:'A vehicle was involved in a minor fender-bender in the hotel loading area. Can it resume service immediately after the driver confirms it\'s driveable?',opts:['Yes — if the driver confirms it\'s mechanically safe','Yes — if the TLO approves','No — any vehicle involved in an incident must be inspected and cleared by the FIFA26 Transport Representative before resuming service','Only if it can be checked at the next depot stop'],ans:2,exp:'Any vehicle involved in an incident — however minor — may only resume service after being inspected and cleared by the FIFA26 Transport Representative. You are that representative on the ground. Document the incident, assess the vehicle, and formally clear it before returning it to service. Do not return an un-cleared vehicle.'},
{q:'How many backup buses are on standby per match day?',opts:['1 total (shared between both teams)','2 total — one per team','3 total — one per team plus 1 shared reserve','4 total — two per team'],ans:1,exp:'One backup coach is on standby per team per match day = 2 backup buses per match total. Before every match day, confirm where your backup bus is staged. This is part of your pre-match checklist.'},
],
content:()=>`
<div class="sb"><h2>Official TBC Fleet Composition</h2>
<table class="dt"><thead><tr><th>Vehicle</th><th>Passengers</th><th>Model</th><th>USA/CAN</th><th>MEX</th></tr></thead><tbody>
<tr><td>Team Bus</td><td>47–55</td><td>Various (AC, toilet, adjustable seats)</td><td>1</td><td>1</td></tr>
<tr><td>Minivan</td><td>6</td><td>Kia Carnival</td><td>2</td><td>0</td></tr>
<tr><td>SUV</td><td>4</td><td>Hyundai Palisade / Kia Telluride (USA/CAN) · Hyundai Santa Fe / Kia Sorento (MEX)</td><td>2</td><td>4</td></tr>
</tbody></table></div>
<div class="sb"><h2>Official Host City Fleet</h2>
<table class="dt"><thead><tr><th>Vehicle</th><th>Passengers</th><th>USA/CAN</th><th>MEX</th></tr></thead><tbody>
<tr><td>Team Bus</td><td>47–55</td><td>1</td><td>1</td></tr>
<tr><td>Minivan</td><td>6</td><td>1 (not 2)</td><td>0</td></tr>
<tr><td>SUV</td><td>4</td><td>2</td><td>3</td></tr>
<tr><td><strong>Large Van (NEW)</strong></td><td>15 (USA/MEX) · 12 (CAN)</td><td>1</td><td>1</td></tr>
</tbody></table></div>
<div class="sb"><h2>Fleet Availability & Vehicle Standards</h2>
<table class="dt"><thead><tr><th>Vehicle Type</th><th>Daily Availability</th></tr></thead><tbody>
<tr><td>TBC light duty (SUVs, minivans)</td><td>11 continuous hours/day</td></tr>
<tr><td>TBC team bus</td><td>15 continuous hours/day</td></tr>
<tr><td>Host city fleet (all)</td><td>15 continuous hours/day</td></tr>
</tbody></table>
<ul class="bl">
<li>All fleet vehicles no older than <strong>5 years</strong> from production year (Rate Card: 4 years)</li>
<li>All vehicles: uniformed English-speaking driver, fuel, insurance, routine maintenance, daily cleaning</li>
<li>All vehicles equipped with <strong>active GPS tracking</strong> with access provided to FIFA26 Transport</li>
<li>Drivers report to start location at least <strong>30 minutes before shift start</strong></li>
</ul>
<div class="callout-i"><div class="cl">Official movement override</div><p>Official team fleet and drivers are available for all official team movements — including security screening — even if scheduled hours are exceeded. The 11/15-hour limits apply to standard planning. A contingency plan will be in place for extended operations. Any journey to unofficial sites outside scheduled hours requires a Rate Card request.</p></div>
</div>
<div class="sb"><h2>Scenario Practice</h2>
<div class="sc-box"><div class="sc-hd">Mexico TBC fleet planning</div>
<div class="sc-body">You are assigned as TC to a team whose TBC is in Guadalajara, Mexico. The TLO calls ahead of arrival to discuss the fleet. They want to confirm they'll have two minivans available for small group shuttles, as they've had in previous tournaments.</div>
<div class="sc-q">What do you tell the TLO?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">Confirm two minivans — Mexico fleet matches USA/Canada TBC fleet.</div>
<div class="sc-c" onclick="sc(this,'r')">Inform the TLO that Mexico TBC fleet has no minivans. Instead, the team has 4 SUVs (4-passenger each) in addition to the team bus. If the TLO needs additional capacity for small group movements, a Rate Card vehicle request may be an option, ordered at least 7 days in advance.</div>
<div class="sc-c" onclick="sc(this,'w')">Tell them you\'ll confirm the fleet composition on arrival and not to plan around it yet.</div>
<div class="sc-c" onclick="sc(this,'w')">Arrange one minivan through Rate Card to supplement the standard 1 Mexico minivan.</div>
</div>
<div class="sc-exp">Mexico TBC has zero minivans — the fleet is 1 bus + 0 minivans + 4 SUVs. This is a significant difference from what teams may be used to. Setting the correct expectation before arrival prevents the TLO from planning movements around vehicles that don\'t exist. Proactively suggest the 4-SUV option for small groups, and offer to help with a Rate Card request if needed.</div>
</div></div>`},

{week:2,day:11,type:'lesson',title:'Rate Card Rules & VAPP System',tag:'Week 3 · Day 2',time:'~45 min',
why:'The Rate Card governs every supplemental vehicle request. The VAPP governs every vehicle\'s access to secure zones. Getting either wrong — a late booking, a missed VAPP, a wrong cancellation — has direct financial and operational consequences.',
obj:['Know Rate Card booking, cancellation, and no-show rules','Know every VAPP type, format, and distribution method','Understand the knockout-round VAPP distribution process'],
takes:['Rate Card: min 8 hrs/day, 7+ days advance for guaranteed type, 48-hr cancellation no charge (cars), 14-day policy (coaches, with elimination exception at 48h).','No-show = 100% charge regardless of circumstances. Amendment fees up to 25% within 72–96h for buses.','All Rate Card orders through the <strong>official FIFA Team Services online portal only</strong> — no verbal, WhatsApp, or email orders.','COM VAPPs: printed, <strong>lower right corner of front windscreen</strong>, non-transferable, inner perimeter access.','F&F VAPPs: USA car VAPPs = digital. All others (bus everywhere; car in CAN/MEX) = printed by Match Director at the Match Coordination Meeting.','Knockout-round VAPPs: distributed <strong>directly by the Transport team onto qualified team vehicles upon match qualification</strong>. No action needed from you — they come to you.'],
quiz:[
{q:'A Rate Card SUV was booked 5 days ago. The TLO cancels it 36 hours before service. What is the charge?',opts:['No charge — well within 48 hours','100% — cancellation within 48 hours for cars','50% — partial refund applies','25% amendment fee'],ans:1,exp:'Car/SUV Rate Card cancellation within 48 hours of service = 100% charge. No exceptions. The TLO needs to know this before cancelling. This is why the 48-hour cancellation window matters — it must be communicated clearly when the booking is placed.'},
{q:'A team is eliminated in the Round of 16. They had a coach booked for a tour two days later. They cancel 50 hours before service specifically because of the elimination. What is the charge?',opts:['100% — 14-day policy applies','No charge — team was eliminated and cancelled more than 48 hours in advance','50% — partial refund for elimination','14-day policy less a 10% goodwill reduction'],ans:1,exp:'Elimination exception: if a team is eliminated and cancels at least 48 hours before service due solely to the elimination, no cancellation penalty applies. 50 hours > 48 hours, reason is elimination = no charge. This exception exists specifically for tournament knock-out situations.'},
{q:'A Rate Card order needs to be placed by the TLO. Which channel is acceptable?',opts:['WhatsApp message to you, which you relay to the depot','Email to FIFA26 Transport','Official FIFA Team Services Rate Card online portal only','Phone call to the Rate Card Supervisor'],ans:2,exp:'All Rate Card orders must be placed through the official FIFA Team Services online portal. No verbal, WhatsApp, email, or phone orders. This creates a documented record for billing (costs are deducted from prize money) and ensures the order is in the system.'},
{q:'In Canada, how are F&F car VAPPs distributed?',opts:['Digitally — same as USA','Printed — distributed by TC at the team hotel the night before the match','Printed — distributed by the Match Director at the Match Coordination Meeting','Mailed to the team hotel 7 days before the match'],ans:2,exp:'F&F car VAPPs in Canada (and Mexico) are printed and distributed by the Match Director at the Match Coordination Meeting. Only USA F&F car VAPPs are distributed digitally. Bus VAPPs everywhere are printed by the Match Director at the MCM.'},
{q:'A Rate Card vehicle arrives but the passengers aren\'t present. After the complimentary wait time expires with no communication, 100% charge applies. For a car on a domestic arrival, how long is the complimentary wait time?',opts:['30 minutes','60 minutes','90 minutes','120 minutes'],ans:1,exp:'Cars/SUVs: 60 minutes complimentary wait for domestic arrivals, 120 minutes for international arrivals. Coaches are billed pro-rated in 1-hour increments after the standard wait. After the complimentary period expires with no communication, no-show charges apply.'},
{q:'For knockout rounds, when do teams receive new VAPPs for the next match?',opts:['14 days before the knockout match','When the TLO submits a formal request through IFES','Distributed directly by the Transport team onto qualified vehicles upon match qualification','At the same time group stage VAPPs are issued'],ans:2,exp:'For knockout rounds (R32 and beyond), new VAPPs are distributed directly by the Transport team onto the qualified team\'s vehicles upon qualification. This is handled automatically — you don\'t need to request them. They come to you as part of the post-qualification process.'},
{q:'COM VAPPs are described as non-transferable. What does this mean?',opts:['They cannot be moved from one parking spot to another','One vehicle cannot share a VAPP with another vehicle — each vehicle requires its own VAPP','They can only be used by the team that was originally assigned them','They expire after each use and must be replaced'],ans:1,exp:'Non-transferable means each VAPP is assigned to one specific vehicle. A vehicle cannot use another vehicle\'s VAPP. If a fleet vehicle breaks down and is replaced, the replacement vehicle needs its own VAPP. This is why the process for issuing new VAPPs upon qualification is handled by the Transport team directly.'},
],
content:()=>`
<div class="sb"><h2>Rate Card — Core Rules</h2>
<div class="ig">
<div class="ic"><div class="ic-l">Availability window</div><div class="ic-v">MD-10 through MD+2</div></div>
<div class="ic"><div class="ic-l">Minimum booking</div><div class="ic-v">8 consecutive hours per day — no exceptions</div></div>
<div class="ic"><div class="ic-l">Advance booking</div><div class="ic-v">7+ days to guarantee vehicle type. Cars within 48h: not guaranteed. Coaches within 96h: cannot be guaranteed.</div></div>
<div class="ic"><div class="ic-l">Car cancellation</div><div class="ic-v">48+ hours before = no charge. Under 48h = 100%.</div></div>
<div class="ic"><div class="ic-l">Coach cancellation</div><div class="ic-v">14-day standard. Elimination within 48h of service = no charge.</div></div>
<div class="ic"><div class="ic-l">No-show</div><div class="ic-v">100% charge — no exceptions</div></div>
<div class="ic"><div class="ic-l">Amendment fees</div><div class="ic-v">Changes within 48h (cars) or 72–96h (buses) = up to 25% of booking value</div></div>
<div class="ic"><div class="ic-l">Wait time (domestic)</div><div class="ic-v">Cars: 60 min complimentary. Coaches: pro-rated hourly.</div></div>
<div class="ic"><div class="ic-l">Wait time (international)</div><div class="ic-v">Cars: 120 min complimentary.</div></div>
<div class="ic"><div class="ic-l">Cost responsibility</div><div class="ic-v">PMA's total cost — deducted from prize money at tournament end</div></div>
</div>
<div class="callout-d"><div class="cl">Ordering rule — no exceptions</div><p>All Rate Card orders must go through the official FIFA Team Services online portal. Verbal, WhatsApp, and email orders are not valid. This applies to every booking, cancellation, and amendment.</p></div>
</div>
<div class="sb"><h2>VAPP System — Complete Reference</h2>
<table class="dt"><thead><tr><th>Type</th><th>Who Gets It</th><th>Access</th><th>Format</th></tr></thead><tbody>
<tr><td>COM VAPP</td><td>All official team fleet vehicles</td><td>Inner secure perimeter: stadiums, TBCTS, VSTS</td><td>Printed — lower right corner front windscreen. Non-transferable.</td></tr>
<tr><td>F&F VAPP (car)</td><td>F&F (10 per team per match)</td><td>Outside perimeter — F&F parking only</td><td>USA: Digital. Canada/Mexico: Printed by Match Director at MCM.</td></tr>
<tr><td>F&F VAPP (bus)</td><td>F&F bus (5 per team per match)</td><td>Outside perimeter — F&F parking only</td><td>All markets: Printed by Match Director at MCM.</td></tr>
</tbody></table>
<div class="callout"><div class="cl">Knockout round VAPP process</div><p>New VAPPs for knockout rounds are distributed directly by the Transport team onto the qualified team\'s vehicles upon qualification — automatically, without any request from you. Rate Card vehicles may receive VAPPs subject to venue capacity and Transport approval.</p></div>
</div>
<div class="sb"><h2>Scenario Practice</h2>
<div class="sc-box"><div class="sc-hd">VAPP missing at the VSA</div>
<div class="sc-body">Your convoy is approaching the stadium VSA on match day. Security stops the last vehicle — a Rate Card SUV. It does not have a COM VAPP displayed. The rest of the convoy is already inside. The team bus and other official vehicles are proceeding to the player entrance. Your team's bus is already in. It's T-45 minutes to kickoff.</div>
<div class="sc-q">What is the correct action for the Rate Card SUV?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">Wave it through — the team is on schedule and it's a Rate Card vehicle, not the team bus.</div>
<div class="sc-c" onclick="sc(this,'r')">Instruct the driver to hold position at the VSA. Contact your Supervisor immediately — they have the authority and channels to resolve a VAPP issue at a VSA checkpoint. Document the incident. The team bus and official vehicles have already cleared — the match-day operation is not disrupted.</div>
<div class="sc-c" onclick="sc(this,'w')">Ask the TLO to speak to security and use their authority to wave it through.</div>
<div class="sc-c" onclick="sc(this,'w')">Tell the driver to park outside the perimeter and the passengers walk in.</div>
</div>
<div class="sc-exp">A vehicle without a VAPP cannot enter the VSA — security personnel are not going to, and should not, wave it through regardless of time pressure. You instruct the driver to hold position, and you contact your Supervisor immediately. Your Supervisor can work with the VTM or Match Director to resolve the VAPP issue at the checkpoint. The match-day operation continues unaffected because the team bus and official vehicles are already inside. Document this incident — it needs to be in your daily report.</div>
</div></div>`},

{week:3,day:13,type:'lesson',title:'Charter & Commercial First Arrivals',tag:'Week 4 · Day 1',time:'~45 min',
why:'The first arrival is the team\'s first impression of the tournament. Charter and commercial arrivals follow completely different operational flows. The 30-minute tarmac entry window is one of the hardest deadlines in the operation.',
obj:['Know every step of the charter first arrival flow','Know commercial first arrival flow and load zone requirements','Understand the kit team segregation and FBO support role'],
takes:['Charter: tarmac processing — vehicles enter tarmac <strong>30 minutes before landing</strong>. Follow airport lead car. Bus sweep dog required before boarding.','Commercial: main terminal processing. Media opportunity at curbside. Load zone must be clear — that\'s your job.','At charter arrivals, the delegation splits after passport control: main delegation → transport; kit team + team doctor → baggage reconciliation → separate transport.','A FIFA AND representative will be present at all host cities for first team arrivals.','Passport control for charter arrivals: at a segregated facility or at the aircraft — subject to specific airport authority. Always confirm with AND before the arrival.','Service levels at airports vary by airport authority. Always check the latest DSLA confirmed version before your first arrival.'],
quiz:[
{q:'For a charter first arrival, vehicles must enter the tarmac how many minutes before landing?',opts:['15','30','45','60'],ans:1,exp:'30 minutes before the scheduled landing time, vehicles and police escort enter the tarmac via the airport lead car. This is a hard timing window. Missing it means you cannot stage on the tarmac — the team exits to vehicles that aren\'t in position.'},
{q:'For charter first arrivals, where does the main delegation go after passport control?',opts:['To baggage reclaim to collect bags along with the kit team','Directly to transport vehicles — they do not wait for baggage','To the FBO lounge for the official FIFA meet and greet','To the security screening area with the kit team'],ans:1,exp:'After passport control, the delegation splits. The main delegation goes directly to transport. The kit team and team doctor stay for baggage reconciliation → customs → separate transport. The team does not wait for baggage — they load and move.'},
{q:'For a commercial first arrival, what is the TC\'s primary positioning duty?',opts:['On the tarmac with vehicles','At the arrival gate airside','Ensuring vehicles are staged at curbside and the load zone is clear and accessible','In the terminal to guide the team through passport control'],ans:2,exp:'For commercial arrivals, vehicles stage at curbside. Your job is to ensure the load zone is clear, vehicles are in position, drivers are briefed, and the handoff from FIFA AND/TPT (who escort the team from the terminal to the load zone) is seamless.'},
{q:'The bus sweep dog check for a charter arrival must be done when?',opts:['After the team boards, as a final check','During boarding, as passengers step on','Before the team boards — bus cannot load until cleared','30 minutes before the aircraft lands'],ans:2,exp:'Bus sweep before boarding. TSLO clears it. Bus cannot load until the sweep is complete. This applies to charter arrivals just as it applies to every other departure or boarding situation — the bus is checked before anyone gets on.'},
{q:'Porter services for a charter arrival must be confirmed:',opts:['On arrival at the airport when the baggage comes off','Within 1 hour of landing','Before the team\'s arrival at the airport — quantity communicated to Airport Manager in advance','By the AND team independently — not a TC responsibility'],ans:2,exp:'Porter services must be coordinated and fully approved before the team\'s arrival. Equipment/luggage quantity must be communicated to the AND Airport Manager prior to arrival. If you wait until the aircraft lands to arrange porters, the baggage flow will be chaotic. Also: teams are responsible for tipping porter services — this is not a FIFA-covered cost.'},
{q:'A FIFA AND representative will be present at all host cities for first arrivals. What does the AND team do at the airport?',opts:['They manage vehicle staging and load zones','They coordinate the FIFA Arrivals & Departures operation — present at airports, coordinate with FBOs, and manage A&D service levels','They handle accreditation checks on behalf of the TC','They manage the police escort with TSLO'],ans:1,exp:'AND (Arrivals & Departures FA) operates at airports alongside ACS. They coordinate the broader A&D operation — airport liaison, FBO coordination, meet and greet protocols. The TC manages the ground transport side; AND manages the airport-side service levels.'},
],
content:()=>`
<div class="sb"><h2>Charter First Arrival Flow</h2>
<div class="flow">
<div class="fs"><div class="fn">1</div><div><div class="ft">Vehicles enter tarmac — 30 min before landing</div><div class="fd">Team + Officials vehicles + police escort on tarmac. Follow airport lead car. Bus sweep dog check required before team boards.</div></div></div>
<div class="fs"><div class="fn">2</div><div><div class="ft">Flight arrives — tarmac meet & greet</div><div class="fd">Teams processed at the tarmac. Media opportunity as team exits aircraft. TLO, TSLO, and FIFA AND staff conduct the meet and greet. First arrival to the tournament includes a formal FIFA welcome.</div></div></div>
<div class="fs"><div class="fn">3</div><div><div class="ft">Passport control — segregated facility or at aircraft</div><div class="fd">Location subject to airport authority regulations. Varies airport to airport. Confirm with AND in advance.</div></div></div>
<div class="fs"><div class="fn">4</div><div><div class="ft">Delegation splits</div><div class="fd"><strong>Main delegation:</strong> customs → transport to hotel. <strong>Kit team + Team Doctor:</strong> baggage reconciliation → customs → separate transport. FBO handles baggage and equipment.</div></div></div>
<div class="fs"><div class="fn">5</div><div><div class="ft">Convoy departs to TBCH/VSTH</div><div class="fd">FIFA AND/TPT escort team to vehicles. Police escort convoy to hotel.</div></div></div>
</div>
<div class="callout-d"><div class="cl">The 30-minute tarmac window is non-negotiable</div><p>30 minutes before landing — not "approximately" or "when the plane is on final approach." Vehicles and escort enter the tarmac at the 30-minute mark. This must be coordinated with the TSLO and airport lead car before that window opens. Miss it and you cannot stage on the tarmac. The team exits to an empty staging area. This is one of the worst operational failures at a first arrival.</p></div>
</div>
<div class="sb"><h2>Commercial First Arrival Flow</h2>
<div class="flow">
<div class="fs"><div class="fn">1</div><div><div class="ft">Meet & greet at arrival gate / terminal</div><div class="fd">TLO, TSLO, and FIFA AND staff present. Airport staff escort team to passport control in segregated flow (subject to airport authority).</div></div></div>
<div class="fs"><div class="fn">2</div><div><div class="ft">Passport control — main terminal</div><div class="fd">Preferential flow may be available at some airports — confirm with AND. Team members are not obliged to wait for baggage.</div></div></div>
<div class="fs"><div class="fn">3</div><div><div class="ft">Baggage & equipment</div><div class="fd">Kit Manager and/or Team Doctor collect and accompany baggage. Airport assistance transfers bags to logistics truck. Team does not wait.</div></div></div>
<div class="fs"><div class="fn">4</div><div><div class="ft">Curbside transport — TC responsibility</div><div class="fd">Media opportunity at curbside near load zone. FIFA AND/TPT escort team to vehicles. Load zone must be clear — TC ensures this. Police escort convoy to hotel.</div></div></div>
</div>
<div class="callout-i"><div class="cl">Service level note</div><p>Airport services vary based on the landing airport and are subject to each airport authority's approval. The final confirmed service level for your assignment is in the DSLA Final version (issued May 4, 2026). Always verify before your first arrival at any airport.</p></div>
</div>
<div class="sb"><h2>Scenario Practice</h2>
<div class="sc-box"><div class="sc-hd">Pre-arrival coordination breakdown</div>
<div class="sc-body">It's T-2 hours before a charter first arrival at an FBO. You have: (1) Porter services not yet confirmed — you've called twice and haven't gotten a callback from the AND Airport Manager. (2) Passport control location unclear — you were told "at the aircraft" but this hasn't been officially confirmed by the airport authority. (3) Your TSLO just confirmed the bus sweep is ready to go and police escort is staged.</div>
<div class="sc-q">What are your next actions, in order of priority?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">Wait — TSLO is confirmed and that\'s the most critical element. Try AND again in 30 minutes.</div>
<div class="sc-c" onclick="sc(this,'r')">Escalate both unresolved items to your Supervisor immediately. Porter services and passport control location must both be confirmed before the aircraft lands — you have 2 hours, but the window is closing. Your Supervisor can escalate to AND leadership and airport authority through faster channels than you have.</div>
<div class="sc-c" onclick="sc(this,'w')">Focus on the passport control question — that affects the team directly. Porter services can wait until the aircraft lands.</div>
<div class="sc-c" onclick="sc(this,'w')">Ask the TLO to contact AND directly — they may have a better contact.</div>
</div>
<div class="sc-exp">Both unresolved items need immediate escalation — not in 30 minutes, not one at a time. Porter services unconfirmed at T-2 hours is a real risk: if porters aren\'t arranged before landing, the baggage flow off the aircraft will be disorganized. Passport control location unconfirmed means the AND team and drivers don\'t know where to position — staging could be wrong. Your Supervisor has authority to escalate to AND leadership and airport authority directly. Two hours is workable, but only if you escalate now.</div>
</div></div>`},

{week:3,day:14,type:'lesson',title:'Intercity Departures & Final Departure',tag:'Week 4 · Day 2',time:'~45 min',
why:'Intercity movements and final departures are the most logistically complex A&D scenarios. Kit Manager timing, boarding pass distribution, security screening protocols, and Mexico-specific requirements all have hard deadlines.',
obj:['Know the full intercity departure flow','Know the final departure flow for eliminated teams','Master the 3-hour Kit Manager rule, boarding pass protocol, and Mexico exit stamp'],
takes:['Kit Managers must arrive at the airport <strong>3 hours before departure</strong> with all equipment and luggage. This is a separate vehicle from the team convoy.','Boarding passes must be distributed <strong>before the team arrives at the airport</strong> — not at check-in. Coordinate with FIFA Travel and the charter operator in advance.','First flight of the tournament: <strong>100% passenger screening</strong> required. Subsequent flights with same operator: percentage-based.','<strong>Mexico international departures require an International Exit Stamp.</strong> Coordinate with TSLO and FBO team well before departure. Missing this causes significant delays.','ACS is present at all charter departures and international charter arrivals. For domestic charter arrivals, TC handles independently.','Final departure from the tournament: same FT-4 standard as the first arrival. Baggage check-in complete before team arrives at airport.'],
quiz:[
{q:'Kit Managers must arrive at the airport how long before an intercity charter departure?',opts:['1 hour','2 hours','3 hours','4 hours'],ans:2,exp:'Kit Managers must arrive 3 hours before departure with all equipment and luggage for check-in. The kit vehicle (truck/van) travels separately from the team convoy and must leave the hotel well in advance of the team convoy departure. These are two separate, independent movements.'},
{q:'Boarding passes for intercity departures should be distributed when?',opts:['At the airport check-in desk on arrival','On the aircraft by the crew','Before the team arrives at the airport','At the hotel lobby 30 minutes before convoy departure'],ans:2,exp:'Boarding passes must be issued in advance and distributed before the team arrives at the airport. Waiting until airport arrival creates delays and is not operationally acceptable. Coordinate with FIFA Travel and the charter operator ahead of time.'},
{q:'For the first flight of the tournament, what passenger screening requirement applies?',opts:['25% — random sampling','50% — standard protocol','75% — enhanced protocol','100% — full passenger screening'],ans:3,exp:'The first flight of the tournament requires 100% passenger screening. Subsequent flights with the same operator use a percentage-based screening approach. Screeners arrive 3 hours before departure.'},
{q:'Which country specifically requires an International Exit Stamp for international departures?',opts:['United States','Canada','Mexico','All three'],ans:2,exp:'Mexico is the only FWC26 host nation that requires an International Exit Stamp for international departures. This must be completed before departure and coordinated with the TSLO and FBO team well in advance. Missing this step causes significant, preventable delays.'},
{q:'For a team\'s final departure on a commercial flight, when is baggage check-in completed?',opts:['At the airport check-in desk when the team arrives','On the bus during the drive to the airport','Before the team arrives at the airport — kit team handles dedicated check-in desks in advance','In the departure lounge after security'],ans:2,exp:'For the final departure, the kit team completes check-in before the team arrives at the airport. Dedicated check-in desks, baggage assistance, and logistics truck coordination all happen before the team convoy arrives. The team should be able to proceed directly through security to the lounge.'},
{q:'ACS is NOT present for which type of movement?',opts:['Charter departures','International charter arrivals','Domestic charter arrivals','All intercity movements'],ans:2,exp:'ACS covers charter departures and international charter arrivals. For domestic charter arrivals, ACS is not present — the TC handles the arrival independently. The AND team is present at all host city airports for key arrivals.'},
],
content:()=>`
<div class="sb"><h2>Intercity Departure Flow</h2>
<div class="flow">
<div class="fs"><div class="fn">1</div><div><div class="ft">Boarding passes issued and distributed before airport arrival</div><div class="fd">Coordinate with FIFA Travel and charter operator in advance. Do not leave this for the morning of departure.</div></div></div>
<div class="fs"><div class="fn">2</div><div><div class="ft">Kit Managers arrive — 3 hours before departure (separate vehicle)</div><div class="fd">PMA kit vehicle (truck/van) transfers all baggage from hotel. Staged separately from team convoy. Screeners also arrive 3 hours before departure.</div></div></div>
<div class="fs"><div class="fn">3</div><div><div class="ft">Security screening</div><div class="fd">First tournament flight: 100% screening. Subsequent flights (same operator): percentage-based. Non-US citizens show passports at departure.</div></div></div>
<div class="fs"><div class="fn">4</div><div><div class="ft">Team convoy departs hotel to airport</div><div class="fd">Police escort if within MD-5 to MD+2 window. Some personal luggage may accompany team — coordinate load zone timing with TSLO.</div></div></div>
<div class="fs"><div class="fn">5</div><div><div class="ft">Mexico only — International Exit Stamp</div><div class="fd">Required for Mexico international departures. Coordinate with TSLO and FBO team well before departure. This step cannot be skipped or rushed.</div></div></div>
</div></div>
<div class="sb"><h2>Team Final Departure</h2>
<p>The team's final departure is the last impression they have of the tournament operation. Execute it at FT-4 standard.</p>
<div class="flow">
<div class="fs"><div class="fn">1</div><div><div class="ft">Baggage check-in completed before team arrives at airport</div><div class="fd">Commercial: dedicated check-in desks, baggage assistance. Charter: baggage tagging at the PMA hotel. Kit Managers 3 hours early.</div></div></div>
<div class="fs"><div class="fn">2</div><div><div class="ft">Boarding passes issued in advance</div><div class="fd">Coordinated with airline or charter operator. Distributed before the team's airport arrival.</div></div></div>
<div class="fs"><div class="fn">3</div><div><div class="ft">Convoy + police escort to airport</div><div class="fd">Full convoy from hotel to terminal/FBO. Police escort if within tournament window.</div></div></div>
<div class="fs"><div class="fn">4</div><div><div class="ft">Load zone → TSA → lounge → farewell → departure</div><div class="fd">Airport staff meets PMA at load zone. Preferential security lane (subject to TSA approval). FIFA staff + TLO escort to aircraft.</div></div></div>
</div></div>
<div class="sb"><h2>Scenario Practice</h2>
<div class="sc-box"><div class="sc-hd">The forgotten kit vehicle timing</div>
<div class="sc-body">It is 06:30. Your team's intercity charter departure is at 10:30 from the TBC airport FBO. The team convoy is scheduled to depart the TBCH at 08:30. You realize the Kit Managers have not been staged for their separate vehicle — the kit vehicle needs to depart at 07:30 to arrive 3 hours before departure at 07:30 (10:30 - 3 hrs). It is 06:30. The Logistics Supervisor is not yet on-site.</div>
<div class="sc-q">What is your action?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">Send the kit vehicle with the team convoy at 08:30 — 2 hours before departure is close enough.</div>
<div class="sc-c" onclick="sc(this,'r')">Contact the Logistics Supervisor immediately, notify your Supervisor of the timing risk, and arrange the kit vehicle departure for 07:30. You have 1 hour — enough time if you act now. The Kit Managers need to be briefed and ready in 60 minutes.</div>
<div class="sc-c" onclick="sc(this,'w')">Ask the TLO if the kit team can check baggage at the airport with the team convoy at 08:30.</div>
<div class="sc-c" onclick="sc(this,'w')">Wait for the Logistics Supervisor to arrive at 07:00 and let them handle it.</div>
</div>
<div class="sc-exp">The 3-hour Kit Manager arrival requirement is hard. The kit vehicle must be at the FBO by 07:30. You have 60 minutes to coordinate this. Contact the Logistics Supervisor immediately (phone, not wait for them to arrive), notify your Supervisor that there was a timing oversight, and get the kit vehicle on the road by 07:30. If you wait for the Logistics Supervisor to arrive at 07:00 and then discuss it, you have 30 minutes to load and depart — that\'s too tight. Act now.</div>
</div>
<div class="sc-box"><div class="sc-hd">Mexico departure — missing a step</div>
<div class="sc-body">Your team is departing Guadalajara (GDL) on an international charter to their home country after elimination. Everything is confirmed: convoy staged, boarding passes distributed, bus sweep done, 100% screening completed (it's their first flight this tournament). The team is loaded and ready. TSLO signals convoy departure. You're reviewing the checklist mentally as the convoy pulls away from the FBO when you realize: the International Exit Stamp has not been processed.</div>
<div class="sc-q">What happens now?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">The flight crew will handle it on the aircraft — it\'s a Mexico customs issue, not transport\'s responsibility.</div>
<div class="sc-c" onclick="sc(this,'r')">This is a major problem. The convoy must stop and the International Exit Stamp must be processed before departure. Notify TSLO immediately to stop the convoy. Coordinate with the FBO team and airport authority to process the exit stamps. The aircraft cannot legally depart Mexico without them. This is entirely preventable — it should have been confirmed in the pre-departure checklist.</div>
<div class="sc-c" onclick="sc(this,'w')">It\'s only required for some international flights — confirm with AND whether it applies here.</div>
<div class="sc-c" onclick="sc(this,'w')">The team can process it at the gate — it\'s a standard step the airport handles automatically.</div>
</div>
<div class="sc-exp">The Mexico International Exit Stamp is mandatory for all international departures from Mexico. The aircraft cannot legally depart without it. This is not a gate step or automatic process — it requires coordination with TSLO and FBO team well before departure. The convoy stops, the exit stamp is processed, and the departure is delayed. This incident would go in your daily report. The lesson: Mexico international departures have a specific additional step that doesn\'t exist in the USA or Canada — it must be on your pre-departure checklist for every Mexico international movement.</div>
</div></div>`},

{q:'You are running the pre-convoy checklist and find one of the SUVs has a missing COM VAPP at step 2 (vehicle inspection). What do you do?',opts:['Proceed — one missing VAPP won\'t stop the convoy','Remove the SUV from the convoy — it cannot proceed without a COM VAPP','Contact your Supervisor and VTM — they can resolve a missing VAPP before departure','Tell the driver to talk to security at the VSA'],ans:1,exp:'A vehicle without a COM VAPP cannot enter the VSA. You have identified this in the pre-convoy inspection — which is exactly why you do the inspection. Contact your Supervisor immediately. They can work through the VTM or Transport team to issue a replacement VAPP or resolve the issue before departure. Do not send that vehicle into the convoy without a VAPP.'},
{q:'On Match Day, a team official without their accreditation asks to board the bus. They left it in their room. What do you do?',opts:['Allow them to board — you know who they are','Allow them to board since it\'s a team official and not a fan','The official retrieves their accreditation before boarding. If there\'s a delay, you notify TLO and TSLO.','Ask the TLO to vouch for them and proceed'],ans:2,exp:'Accreditation checks on MD-1 and MD apply to everyone boarding team vehicles to the stadium — no exceptions based on who they are or how well you know them. The official retrieves their pass. If this causes a brief delay, notify TLO and TSLO immediately so they can account for the timing. Document it.'},

content:()=>`
<div class="sb"><h2>Scenario 1 — Team Base Camp Convoy</h2>
<p>Used for group stage daily movements: TBCH ↔ TBCTS and TBCH ↔ airport.</p>
<div class="sc-box"><div class="sc-hd">Official fleet composition — TBC</div>
<div class="conv-row"><span class="cv pol">Police</span><span class="cv-a">→</span><span class="cv">SUV</span><span class="cv-a">→</span><span class="cv bus">PMA Bus</span><span class="cv-a">→</span><span class="cv">SUV</span><span class="cv-a">→</span><span class="cv">Minivan</span><span class="cv-a">→</span><span class="cv">Minivan</span><span class="cv-a">→</span><span class="cv rc">Rate Card (if ordered)</span><span class="cv-a">→</span><span class="cv pol">Police</span></div>
</div></div>
<div class="sb"><h2>Scenario 2 — Host City / MD-2 Convoy</h2>
<p>Used for match trips to host cities. PMA-branded bus. Large Van added. Rate Card up to 3 additional vehicles.</p>
<div class="sc-box"><div class="sc-hd">Official fleet composition — Host City / MD-2</div>
<div class="conv-row"><span class="cv pol">Police</span><span class="cv-a">→</span><span class="cv">SUV</span><span class="cv-a">→</span><span class="cv">SUV</span><span class="cv-a">→</span><span class="cv">Minivan</span><span class="cv-a">→</span><span class="cv bus">PMA Branded Bus</span><span class="cv-a">→</span><span class="cv">Large Van</span><span class="cv-a">→</span><span class="cv rc">Rate Card (up to 3)</span><span class="cv-a">→</span><span class="cv pol">Police</span></div>
</div></div>
<div class="sb"><h2>Pre-Convoy Checklist — 6 Steps</h2>
<div class="flow">
<div class="fs"><div class="fn">1</div><div><div class="ft">Schedule confirmed in IFES by TLO — day prior, 17:00</div><div class="fd">If not by 16:30, follow up. If not by 17:00, alert Supervisor. Never stage on unconfirmed schedule.</div></div></div>
<div class="fs"><div class="fn">2</div><div><div class="ft">Vehicle inspection</div><div class="fd">Clean, fueled, functional, branded if applicable, COM VAPP lower right windscreen. Flag issues to depot immediately.</div></div></div>
<div class="fs"><div class="fn">3</div><div><div class="ft">Driver briefing</div><div class="fd">Convoy order, approved route, timing, contingency if separated. Every driver knows their position.</div></div></div>
<div class="fs"><div class="fn">4</div><div><div class="ft">Bus sweep — TSLO authorization</div><div class="fd">Security dog sweep. Coordinate timing with TSLO. Bus CANNOT load until TSLO clears sweep.</div></div></div>
<div class="fs"><div class="fn">5</div><div><div class="ft">Accreditation check at boarding (MD-1 and MD)</div><div class="fd">Check every pass before boarding. Only accredited team members on stadium movements. No exceptions.</div></div></div>
<div class="fs"><div class="fn">6</div><div><div class="ft">TSLO clearance — convoy departs</div><div class="fd">Notify TSLO convoy is loaded and ready. TSLO signals departure. You do not depart without TSLO clearance.</div></div></div>
</div></div>
<div class="sb"><h2>Scenario Practice</h2>
<div class="sc-box"><div class="sc-hd">Convoy count check — Scenario 1</div>
<div class="sc-body">Your team has a Scenario 1 TBC movement. Official fleet: Police + SUV + PMA Bus + SUV + Minivan + Minivan = 6 vehicles including 2 police units. The TLO has ordered 3 Rate Card SUVs for additional coaching staff. Total proposed convoy: 6 official + 3 RC = 9 vehicles.</div>
<div class="sc-q">What is the issue and what do you do?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">9 vehicles is fine — the 8-vehicle limit doesn\'t apply when Rate Card vehicles are added.</div>
<div class="sc-c" onclick="sc(this,'r')">9 vehicles exceeds the 8-vehicle maximum. You need to inform the TLO that only 2 of the 3 Rate Card SUVs can be added to this convoy. The third Rate Card vehicle must either travel separately outside the convoy, or the TLO needs to cancel one of the bookings (checking the cancellation window).</div>
<div class="sc-c" onclick="sc(this,'w')">Count police units separately — 6 official + 3 RC = 9, but police don\'t count toward the limit.</div>
<div class="sc-c" onclick="sc(this,'w')">Ask the TSLO if a 9-vehicle convoy is acceptable given the police escort capacity.</div>
</div>
<div class="sc-exp">The 8-vehicle maximum is absolute. Police units, official fleet, and Rate Card vehicles all count toward the limit. 6 + 3 = 9, which exceeds 8. You tell the TLO: only 2 of the 3 Rate Card SUVs can join the convoy. The third vehicle can travel separately to the destination but outside the protected convoy, or the booking can be cancelled (within the applicable window). This needs to be resolved before the convoy departs.</div>
</div></div>`},

content:()=>`
<div class="sb"><h2>Vehicle Branding Rules</h2>
<table class="dt"><thead><tr><th>Fleet Type</th><th>Branding Status</th><th>Period</th><th>Cost</th></tr></thead><tbody>
<tr><td>Host city fleet</td><td>PMA-branded</td><td>MD-2 through MD+1</td><td>Included in tournament provision</td></tr>
<tr><td>TBC fleet</td><td>Unbranded by default</td><td>N/A</td><td>Team's cost if they choose to brand</td></tr>
<tr><td>Intercity movement buses</td><td>Always unbranded</td><td>All movements</td><td>N/A</td></tr>
<tr><td>Dead-day (overlapping teams)</td><td>Unbranded bus provided</td><td>Designated dead day</td><td>Team's cost if TBC fleet is branded</td></tr>
</tbody></table>
<div class="callout-i"><div class="cl">Approved branding vendors</div><p>The Look Company, Wasserman, A3 Visuals, TMS. Any branding must be submitted for FIFA review and receive prior written approval. This is not a TC decision — direct any branding inquiries to Team Services.</p></div>
</div>
<div class="sb"><h2>Logistics Equipment Allocation</h2>
<table class="dt"><thead><tr><th>Movement Type</th><th>Equipment</th><th>Capacity</th></tr></thead><tbody>
<tr><td>First arrival, final departure, knockout stage</td><td>1× 24ft + 1× 16ft truck with driver</td><td>2,300 cu ft / 15,000 lbs</td></tr>
<tr><td>Daily movements, group stage airport transfers</td><td>1× 16ft truck with driver</td><td>850 cu ft / 5,000 lbs</td></tr>
</tbody></table>
<ul class="bl">
<li>Service window: 5 days before first match through 2 days after final match</li>
<li><strong>Passengers are not permitted in truck cabs — ever</strong></li>
<li>Kit truck must be fully offloaded and a <strong>handover form signed</strong> by PMA representative upon transfer completion</li>
<li>Equipment cannot be left in trucks overnight at stadiums, airports, or training sites</li>
<li>At VSTH overnight: requires a <strong>signed waiver in advance</strong> — liability releases to PMA</li>
</ul>
</div>
<div class="sb"><h2>Multi-City Handoff Protocol</h2>
<div class="two-col">
<div class="rc"><h4>Sending TC must provide</h4><ul>
<li>ETA and specific airport</li>
<li>Flight number</li>
<li>Convoy composition (vehicles + order)</li>
<li>Special needs (medical, VIP, RC vehicles)</li>
<li>TLO and TSLO contact information</li>
<li>Any outstanding issues or flags</li>
</ul></div>
<div class="rc"><h4>Receiving TC must confirm</h4><ul>
<li>Receipt of full briefing package</li>
<li>Host city fleet staged 60 min before ETA</li>
<li>TSLO aligned on escort and convoy</li>
<li>Correct A&D flow confirmed (domestic vs international)</li>
<li>Load zone clear at VSTH on arrival</li>
</ul></div>
</div>
<div class="callout"><div class="cl">The golden rule of handoffs</div><p>The receiving TC should never be surprised. If you are the sending TC, communicate everything before the team departs — not while they're in the air. If you're the receiving TC and your briefing package is incomplete, call the sending TC directly. Do not wait and hope the information arrives.</p></div>
</div>`},

content:()=>`
<div class="sb"><h2>TC Core Duties — By Domain</h2>
<div class="two-col">
<div class="rc"><h4>Client Services</h4><ul>
<li>Primary on-site contact for TLO/TSLO at TBCH or VSTH</li>
<li>SLA and FIFA transport policy compliance</li>
<li>Bubble-to-bubble operation coordination</li>
<li>Load zone availability and maintenance</li>
<li>Rate Card management with TLO/TSLO</li>
<li>Daily incident and performance reporting</li>
</ul></div>

{week:5,day:20,type:'lesson',title:'Disruption Management & Ethics',tag:'Week 6 · Day 2',time:'~45 min',
why:'Disruptions happen on every event. Your response — how quickly you communicate, how correctly you escalate, and what you never improvise on — determines whether a disruption is managed or becomes an operational failure. Ethics and conduct are not afterthoughts.',
obj:['Classify disruption types and execute the correct response','Execute the communication cascade accurately','Know the gift policy, media rules, and social media conduct requirements'],
takes:['Six disruption types: flight delay, vehicle breakdown, driver no-show, security incident, route closure, same-day schedule change.','Communication cascade: identify → notify TLO/TSLO + Supervisor simultaneously → execute resolution → document. Do not sequence — do steps 2 and 3 at the same time.','<strong>Security incidents: stop, secure, call TSLO.</strong> Zero independent security decisions. No exceptions.','Route closures: only FIFA-approved alternates. Drivers follow police escort — not their own GPS or judgment.','<strong>No gifts or gratuities from any client group.</strong> Politely decline and report to Supervisor. This protects you professionally.','No media statements, no social media operational content during deployment. Redirect all media to Supervisor.'],
quiz:[
{q:'Your convoy encounters a road closure. The driver suggests a local alternate. You should:',opts:['Approve it — 5 minutes saved is worth it','Ask the TLO if the alternate is acceptable','Notify TSLO immediately — hold convoy. Only FIFA-approved alternates can be used.','Use your judgment based on the severity of the closure'],ans:2,exp:'No deviation from a FIFA-approved route without TSLO clearance. Notify TSLO immediately and hold convoy position until they provide an approved alternate or clearance to proceed. Drivers follow police escort instructions — not their own GPS.'},
{q:'Your disruption communication cascade requires you to notify TLO/TSLO and Supervisor:',opts:['TLO/TSLO first, then Supervisor 5 minutes later after you\'ve assessed','Supervisor first, then TLO/TSLO','Simultaneously — both notifications happen at the same time','Supervisor only — they will notify TLO/TSLO through their channels'],ans:2,exp:'Steps 2 and 3 of the cascade are simultaneous: TLO/TSLO and Supervisor are notified at the same time. TLO needs to know before the team does. Supervisor cannot help what they don\'t know about. Do not sequence them.'},
{q:'A vehicle breaks down 20 minutes before a match-day convoy departure. In order, you:',opts:['Try to fix it → call TLO → then call depot','Call depot for replacement, notify Supervisor, notify TLO/TSLO — simultaneously','Wait 10 minutes to see if the driver can fix it, then escalate','Cancel the vehicle\'s convoy position and proceed with fewer vehicles'],ans:1,exp:'Immediately: (1) call depot for a 1-hour SLA replacement, (2) notify Supervisor, (3) notify TLO/TSLO — all simultaneously. 20 minutes is enough to get a replacement staged if you act immediately. Waiting is not an option. The vehicle remains sidelined until cleared by the FIFA26 Transport Representative.'},
{q:'A team official offers you a cash gift after a perfect match day, saying "this is personal, not official." You:',opts:['Accept it — a personal gesture from a grateful official is fine','Accept it but log it in your daily report','Politely decline and report the offer to your Supervisor','Accept only if the value is under $50'],ans:2,exp:'No gifts or gratuities from any client group under any circumstances. Politely decline without making it awkward — "I appreciate the sentiment, but I\'m not able to accept gifts in this role." Then report the offer to your Supervisor. This is not about the amount or the intent — it is a blanket policy that protects you professionally.'},
{q:'A journalist approaches your load zone and asks about the team\'s convoy route to the stadium. You say:',opts:['"The route is confidential — sorry." Then walk away.','Nothing — ignore them completely','Politely: "I\'m not authorized to speak on behalf of the operation. For media inquiries, please contact our communications team."','Give them the general direction but not the specific route'],ans:2,exp:'You redirect politely and clearly. You are not authorized to speak on behalf of the operation. Never share operational information — route, timing, client details — with media or anyone outside the operational chain. Then document that the contact occurred.'},

content:()=>`
<div class="sb"><h2>The Six Disruption Types & First Response</h2>
<div class="ig">
<div class="ic"><div class="ic-l">Flight delay / change</div><div class="ic-v">IFES updates TMM every 15 min. When ETA shifts 15+ min: notify TLO, TSLO, and drivers. Restage vehicles as needed.</div></div>
<div class="ic"><div class="ic-l">Vehicle breakdown</div><div class="ic-v">Call depot (1-hr SLA). Notify Supervisor + TLO/TSLO simultaneously. Do not return to service without FIFA26 Transport clearance.</div></div>
<div class="ic"><div class="ic-l">Driver no-show</div><div class="ic-v">Call depot immediately for replacement. Escalate to Supervisor. Never delay the team while searching — get a replacement vehicle if needed.</div></div>
<div class="ic"><div class="ic-l">Security incident</div><div class="ic-v">Stop movement. Secure team in vehicle. Contact TSLO. Zero independent security decisions. Document everything.</div></div>
<div class="ic"><div class="ic-l">Route closure</div><div class="ic-v">Notify TSLO. Hold convoy. Only FIFA-approved alternates. Drivers follow police escort — not their own navigation.</div></div>
<div class="ic"><div class="ic-l">Same-day schedule change</div><div class="ic-v">TLO informs you. Update TMM immediately. Notify all drivers. Confirm load zone at new timing. Document deviation.</div></div>
</div></div>
<div class="sb"><h2>The Communication Cascade</h2>
<div class="flow">
<div class="fs"><div class="fn">1</div><div><div class="ft">Identify & assess (0–2 minutes)</div><div class="fd">Can you resolve it in 5 minutes without escalation? If yes — act. If no — move to steps 2 and 3 simultaneously.</div></div></div>
<div class="fs"><div class="fn">2+3</div><div><div class="ft">Notify TLO/TSLO AND Supervisor — simultaneously</div><div class="fd">TLO: what happened, what you're doing. Supervisor: brief call, clear facts, what you need. These happen at the same time — not in sequence.</div></div></div>
<div class="fs"><div class="fn">4</div><div><div class="ft">Execute resolution</div><div class="fd">Deploy backup, update TMM, re-brief drivers, adjust load zone. Follow approved procedures. No improvisation on security or routing.</div></div></div>
<div class="fs"><div class="fn">5</div><div><div class="ft">Document immediately</div><div class="fd">What happened, when, what was done, follow-up needed. In the daily report. Do not wait until end of shift.</div></div></div>
</div>
<div class="callout-d"><div class="cl">Hard limits — never improvise on these</div><p>Routing (only FIFA-approved). Security decisions (always TSLO). Accreditation bypass (zero exceptions). F&F vehicles (outside scope). These are not guidelines. They are boundaries.</p></div>
</div>
<div class="sb"><h2>Ethics & Conduct</h2>
<div class="two-col">
<div class="rc"><h4>What you must do</h4><ul>
<li>Decline all gifts and gratuities</li>
<li>Report all gift offers to Supervisor</li>
<li>Disclose personal relationships with PMA members</li>
<li>Report misconduct, safety issues, policy violations</li>
<li>Maintain full operational confidentiality</li>
</ul></div>
<div class="rc"><h4>What you must never do</h4><ul>
<li>Accept any benefit from a client group</li>
<li>Share routes, schedules, or client info externally</li>
<li>Post operational content on social media</li>
<li>Speak to media on behalf of the operation</li>
<li>Make security or routing decisions independently</li>
</ul></div>
</div></div>`},

content:()=>`
<div class="sb"><h2>Week 1 — Foundations & the Operational World</h2>
<ul class="bl">
<li><strong>Scope:</strong> 48 teams, 3 countries, 16 cities, 16 stadiums, 104 matches, 48 TBCs. June 11 – July 19, 2026. 39 days.</li>
<li><strong>Stadium names:</strong> Always use official FIFA tournament names. Mercedes-Benz → Atlanta Stadium. AT&T → Dallas Stadium. Etc.</li>
<li><strong>Airports:</strong> Multi-airport cities require IFES verification before staging. NY/NJ (4), SF (3), Dallas (2), Houston (2), Miami (2), Mexico City (3), Toronto (2).</li>
<li><strong>TBC structure:</strong> TBCH + TBCTS + airport. VSTH + VSTS = host city match trip. Intercity road max 2.5 hours one-way. TBCH drivers return after VSTH drop-off.</li>
<li><strong>Service window:</strong> MD-5 to MD+2. Up to 16 hours/day. Police escort: MD-5 to MD+2.</li>
</ul></div>
<div class="sb"><h2>Week 2 — Systems, Tools & Stakeholder Protocols</h2>
<ul class="bl">
<li><strong>IFES → TMM</strong> every 15 min. TLO confirms by 17:00 day prior. 30-day advance flight submission for airport services.</li>
<li><strong>TMM = single source of truth.</strong> Verbal changes don't exist operationally. Drivers use FIFA Drive App (integrated with TMM).</li>
<li><strong>Two devices:</strong> tablet (TMM Lite) + duty phone. Both pass pre-shift check. 7-step pre-shift protocol. 5-step shift close.</li>
<li><strong>PMA delegation:</strong> avg 68 people. F&F = no transport, no Rate Card. VAPPs only (10 car + 5 bus per match).</li>
<li><strong>TLO:</strong> daily face-to-face briefing, IFES confirmation by 17:00. <strong>TSLO:</strong> police escort, bus sweep, route authority. No independent security or routing decisions — ever.</li>
</ul></div>
<div class="sb"><h2>Week 3 — Fleet, Vehicles & Rate Card</h2>
<ul class="bl">
<li><strong>TBC USA/CAN:</strong> 1 bus + 2 minivans + 2 SUVs. <strong>Mexico TBC:</strong> 1 bus + 0 minivans + 4 SUVs. Light duty = 11 hrs/day. Bus = 15 hrs/day.</li>
<li><strong>Host city adds Large Van</strong> (new for FWC26): 15 passengers (USA/MEX), 12 (CAN). Host city = 15 hrs/day all vehicles.</li>
<li><strong>Rate Card:</strong> min 8 hrs, 7+ days advance, 48-hr cancel for cars (no charge), 14-day for coaches (elimination exception at 48h), no-show = 100%. Orders via official portal only.</li>
<li><strong>COM VAPP:</strong> printed, lower right windscreen, non-transferable, inner perimeter access. F&F VAPPs: USA car = digital. All others = printed by Match Director at MCM.</li>
<li><strong>Breakdown SLA:</strong> 1-hour replacement. Incident vehicles cleared by FIFA26 Transport Representative before resuming service.</li>
</ul></div>
<div class="sb"><h2>Week 4 — Arrivals & Departures</h2>
<ul class="bl">
<li><strong>Charter first arrival:</strong> tarmac, vehicles enter 30 min before landing, bus sweep required, delegation splits after passport control.</li>
<li><strong>Commercial first arrival:</strong> main terminal, curbside load zone, media at curbside.</li>
<li><strong>Intercity departure:</strong> boarding passes before team arrives, Kit Managers 3 hrs before departure (separate vehicle), 100% screening on first flight.</li>
<li><strong>Mexico international departure:</strong> International Exit Stamp required — coordinate well before departure.</li>
<li><strong>Final departure:</strong> baggage check-in complete before team arrives. Same FT-4 standard as first arrival.</li>
<li><strong>Porter services:</strong> confirmed and approved before team arrives. Teams tip porters (not FIFA-covered).</li>
</ul></div>
<div class="sb"><h2>Week 5 — Convoy, Match Day & Fleet Execution</h2>
<ul class="bl">
<li><strong>Scenario 1 (TBC):</strong> Police → SUV → PMA Bus → SUV → Minivan → Minivan → [RC] → Police</li>
<li><strong>Scenario 2 (HC/MD-2):</strong> Police → SUV → SUV → Minivan → PMA Branded Bus → Large Van → [RC up to 3] → Police</li>
<li><strong>Max 8 vehicles.</strong> 6-step pre-convoy checklist: IFES → vehicles → drivers → bus sweep → accreditation → TSLO clearance.</li>
<li><strong>Branding:</strong> host city MD-2 to MD+1. TBC unbranded. Intercity always unbranded. Dead-day = unbranded bus if teams overlap.</li>
<li><strong>Multi-city handoff:</strong> sending TC provides ETA, flight, airport, convoy composition, special needs, TLO/TSLO contacts. Always specify local time of relevant airport.</li>
</ul></div>
<div class="sb"><h2>Week 6 — Roles, Disruptions & Certification</h2>
<ul class="bl">
<li><strong>TC reports to:</strong> Cluster Supervisor → CS Supervisor → CS Manager (Jason Mathew, Teams) → Greg Muir → Deborah Fales → Pedro Coley.</li>
<li><strong>Daily report:</strong> submitted before end of every shift. Non-optional. Your professional record.</li>
<li><strong>Disruption cascade:</strong> identify → notify TLO/TSLO + Supervisor simultaneously → execute → document.</li>
<li><strong>Security:</strong> stop, secure, TSLO. Zero independent decisions. Routes = FIFA-approved only. TSLO clearance for any deviation.</li>
<li><strong>Ethics:</strong> no gifts, no media statements, no social media ops content. Report misconduct. Decline gift offers politely and notify Supervisor.</li>
</ul>
<div class="callout"><div class="cl">Final certification tomorrow</div><p>85% required to pass. 25 questions covering all 6 weeks. Review any section where you're unsure before starting. You are ready.</p></div>
</div>`},

// ─── ENGINE ───
function sc(el,type){
  const box=el.closest('.sc-opts');
  if(!box)return;
  box.querySelectorAll('.sc-c').forEach(c=>{c.classList.add('sc-off');c.classList.remove('sc-right','sc-wrong');});
  el.classList.remove('sc-off');el.classList.add(type==='r'?'sc-right':'sc-wrong');
  const exp=box.parentElement.querySelector('.sc-exp');
  if(exp)exp.style.display='block';
}

function save(){localStorage.setItem(SK,JSON.stringify(S))}
function isDone(i){return!!S['d_'+i]}
function setDone(i){S['d_'+i]=true;save();renderSB();updateProg()}
function getKC(i){return S['kc_'+i]??null}
function setKC(i,s){S['kc_'+i]=s;save()}

function updateProg(){
  let done=0;
  DAYS.forEach((d,i)=>{
    if(d.type==='kc'){const s=getKC(i);if(s!==null&&s>=(d.kcPassScore||80))done++;}
    else if(isDone(i))done++;
  });
  const pct=Math.round((done/DAYS.length)*100);
  document.getElementById('opct').textContent=pct+'%';
  document.getElementById('obar').style.width=pct+'%';
  document.getElementById('dlbl').textContent=done+' of '+DAYS.length+' complete';
}

function renderSB(){
  const nav=document.getElementById('sb-nav');
  let html='';let cw=-1;
  DAYS.forEach((d,i)=>{
    if(d.week!==cw){if(cw>0)html+='</div>';cw=d.week;html+=`<div class="wk-grp"><div class="wk-hdr">${WEEKS[d.week].l}</div>`;}
    const done=isDone(i);const ks=d.type==='kc'?getKC(i):null;const kp=ks!==null&&ks>=(d.kcPassScore||80);
    let ic='';
    if(d.type==='kc'&&kp)ic='<div class="d-ico done">✓</div>';
    else if(d.type==='kc')ic='<div class="d-ico kc">KC</div>';
    else if(d.type==='recap'&&done)ic='<div class="d-ico done">✓</div>';
    else if(d.type==='recap')ic='<div class="d-ico recap">R</div>';
    else if(done)ic='<div class="d-ico done">✓</div>';
    else ic='<div class="d-ico"></div>';
    html+=`<div class="day-row ${cur===i?'active':''}" onclick="showDay(${i})"><span class="d-num">${String(d.day).padStart(2,'0')}</span><span class="d-lbl">${d.title}</span>${ic}</div>`;
    if(i===DAYS.length-1||DAYS[i+1].week!==d.week)html+='</div>';
  });
  nav.innerHTML=html;
}

function showHome(){
  cur=null;document.getElementById('bc').innerHTML='<span>FWC26</span> · TC Training Portal';renderSB();
  let bw=WEEKS.map(()=>0);
  DAYS.forEach((d,i)=>{const done=d.type==='kc'?(getKC(i)!==null&&getKC(i)>=(d.kcPassScore||80)):isDone(i);if(done)bw[d.week]++;});
  const td=bw.reduce((a,b)=>a+b,0);
  const wc=WEEKS.map((w,wi)=>{
    const din=DAYS.filter(d=>d.week===wi).length;const done=bw[wi];const pct=Math.round((done/din)*100);
    return`<div class="wc ${w.cls}" onclick="showDay(${DAYS.findIndex(d=>d.week===wi)})"><div class="wc-n">${w.l}</div><div class="wc-t">${w.t}</div><div class="wc-d">${w.d}</div><div class="wc-p"><div class="wc-b"><div class="wc-f" style="width:${pct}%"></div></div><span class="wc-pc">${done}/${din}</span></div></div>`;
  }).join('');
  document.getElementById('ca').innerHTML=`
    <div class="hh"><div class="hh-ey">FIFA World Cup 2026™ · Transport Operations</div><h1 class="hh"><em>TC Training</em><br>Portal</h1><p>6 weeks · 4–5 sessions per week · 30–45 minutes per session. Deep, scenario-rich learning with a mini quiz every day. Complete all sessions and pass the Final Certification (85%) to receive deployment clearance.</p></div>
    <div class="sr"><div class="sc"><div class="sv">${td}</div><div class="sl">Complete</div></div><div class="sc"><div class="sv">${DAYS.length}</div><div class="sl">Total</div></div><div class="sc"><div class="sv">6</div><div class="sl">Weeks</div></div><div class="sc"><div class="sv">${Math.round((td/DAYS.length)*100)}%</div><div class="sl">Progress</div></div></div>
    <div class="wcs">${wc}</div>`;
}

function showDay(i){
  cur=i;const d=DAYS[i];renderSB();
  document.getElementById('bc').innerHTML=`<span>${WEEKS[d.week].l}</span> · ${d.title}`;
  if(d.type==='kc')renderKC(i);
  else if(d.type==='recap')renderRecap(i);
  else renderLesson(i);
}

function renderLesson(i){
  const d=DAYS[i];const done=isDone(i);
  const op=d.obj.map(o=>`<span class="obj-p">${o}</span>`).join('');
  const tk=d.takes.map(t=>`<li>${t}</li>`).join('');
  const mq=buildMQ(i,d.quiz);
  document.getElementById('ca').innerHTML=`
    <div class="l-intro"><div class="l-tag">${d.tag}</div><div class="l-title">${d.title}</div><div class="l-why">${d.why}</div><div class="l-time">⏱ ${d.time}</div><div class="l-obj">${op}</div></div>
    ${d.content()}
    <div class="tak-box"><div class="tak-hdr">Key takeaways</div><ul class="tak-ul">${tk}</ul></div>
    ${mq}
    <div class="done-bar"><p>${done?'✓ This day is complete. You can retake the mini quiz any time.':'Pass the mini quiz above (70%) to mark this day complete.'}</p>${done?`<button class="btn btn-ghost">✓ Complete</button>`:''}</div>`;
  window['_mqa_'+i]={};
}

function buildMQ(i,qs){
  if(!qs||!qs.length)return'';
  const qh=qs.map((q,qi)=>{
    const ltrs=['A','B','C','D'];
    const oh=q.opts.map((o,oi)=>`<div class="mo" id="mo_${i}_${qi}_${oi}" onclick="mqSel(${i},${qi},${oi})"><span class="ml">${ltrs[oi]}</span><span>${o}</span></div>`).join('');
    return`<div class="mq-q"><div class="mq-qtxt">${qi+1}. ${q.q}</div><div class="mq-opts">${oh}</div><div class="mq-exp" id="mex_${i}_${qi}"></div></div>`;
  }).join('');
  return`<div class="mq" id="mq_${i}"><div class="mq-hdr">Mini quiz — ${qs.length} questions · 70% to complete this day</div>${qh}<div class="mq-acts"><button class="btn btn-gold" onclick="submitMQ(${i})">Check Answers</button><span style="font-size:11px;color:var(--muted)">Answer all questions first</span></div><div class="mq-res" id="mqr_${i}"></div></div>`;
}

function mqSel(i,qi,oi){
  if(!window['_mqa_'+i])window['_mqa_'+i]={};
  const d=DAYS[i];
  for(let x=0;x<d.quiz[qi].opts.length;x++){const e=document.getElementById(`mo_${i}_${qi}_${x}`);if(e)e.classList.remove('sel');}
  const e=document.getElementById(`mo_${i}_${qi}_${oi}`);if(e)e.classList.add('sel');
  window['_mqa_'+i][qi]=oi;
}

function submitMQ(i){
  const d=DAYS[i];if(!window['_mqa_'+i])window['_mqa_'+i]={};
  let correct=0;
  d.quiz.forEach((q,qi)=>{
    const sel=window['_mqa_'+i][qi];
    for(let x=0;x<q.opts.length;x++){
      const e=document.getElementById(`mo_${i}_${qi}_${x}`);
      if(e){e.classList.remove('sel');e.style.pointerEvents='none';if(x===q.ans)e.classList.add('r');else if(x===sel&&sel!==q.ans)e.classList.add('w');}
    }
    const ex=document.getElementById(`mex_${i}_${qi}`);
    if(ex&&q.exp){ex.style.display='block';ex.textContent=q.exp;}
    if(sel===q.ans)correct++;
  });
  const pct=Math.round((correct/d.quiz.length)*100);const passed=pct>=70;
  const r=document.getElementById('mqr_'+i);
  if(r){
    r.className='mq-res '+(passed?'pass':'fail');
    r.innerHTML=passed
      ?`<h4>✓ ${pct}% — ${correct}/${d.quiz.length} correct</h4><p>Day complete. Review any flagged explanations above before moving on.</p>`
      :`<h4>✗ ${pct}% — ${correct}/${d.quiz.length} correct</h4><p>Need 70% to complete this day. Review the explanations above, revisit the content, and try again.</p>`;
    if(passed){setDone(i);const db=document.querySelector('.done-bar');if(db)db.innerHTML=`<p>✓ Day complete.</p><button class="btn btn-ghost" onclick="goNext()">Next Day →</button>`;}
  }
}

function renderRecap(i){
  const d=DAYS[i];const done=isDone(i);
  const items=d.recapItems.map(r=>`<li>${r}</li>`).join('');
  let scHtml='';
  if(d.scenarios&&d.scenarios.length){
    scHtml=d.scenarios.map((sc2,si)=>{
      const ch=sc2.choices.map((c,ci)=>`<div class="sc-c" onclick="recapSC(${i},${si},${ci},${ci===sc2.correct},'${sc2.exp.replace(/'/g,"\\'")}')">${c}</div>`).join('');
      return`<div class="sc-box"><div class="sc-hd">Scenario practice</div><div class="sc-body">${sc2.body}</div><div class="sc-q">What is your action?</div><div class="sc-opts">${ch}</div><div class="sc-exp" id="rse_${i}_${si}"></div></div>`;
    }).join('');
  }
  const mq=buildMQ(i,d.quiz);
  document.getElementById('ca').innerHTML=`
    <div class="rec-ban"><div class="rec-tag">${d.tag}</div><div class="rec-title">${d.title}</div><div class="rec-desc">Review the key points from this section. Work through the scenario, then pass the mini quiz to mark this recap day complete.</div></div>
    <div class="sb"><h2>Review — key points</h2><ul class="tak-ul">${items}</ul></div>
    ${scHtml?`<div class="sb"><h2>Scenario practice</h2>${scHtml}</div>`:''}
    ${mq}
    <div class="done-bar"><p>${done?'✓ Recap day complete.':'Pass the mini quiz to mark this recap day complete.'}</p>${done?`<button class="btn btn-ghost">✓ Complete</button>`:''}</div>`;
  window['_mqa_'+i]={};
}

function recapSC(di,si,ci,correct,explain){
  const id=`rse_${di}_${si}`;
  const box=document.getElementById(id)?.parentElement?.querySelector('.sc-opts');
  if(box){box.querySelectorAll('.sc-c').forEach(c=>{c.classList.add('sc-off');});
  box.children[ci].classList.remove('sc-off');box.children[ci].classList.add(correct?'sc-right':'sc-wrong');}
  const exp=document.getElementById(id);if(exp){exp.style.display='block';exp.textContent=explain;}
}

function renderKC(i){
  const d=DAYS[i];const ps=d.kcPassScore||80;const es=getKC(i);const ap=es!==null&&es>=ps;
  const qh=d.questions.map((q,qi)=>{
    const ltrs=['A','B','C','D'];
    const oh=q.opts.map((o,oi)=>`<div class="ko" id="ko_${qi}_${oi}" onclick="kcSel(${qi},${oi},${i})"><span class="kl">${ltrs[oi]}</span><span>${o}</span></div>`).join('');
    return`<div class="kc-qb" id="kqb_${qi}"><div class="kc-qn">Question ${qi+1} of ${d.questions.length}</div><div class="kc-qt">${q.q}</div><div class="kc-os">${oh}</div></div>`;
  }).join('');
  document.getElementById('ca').innerHTML=`
    <div class="kc-ban"><div class="kc-tag">${d.tag}</div><h1>${d.title}</h1><p>Score ${ps}% or higher to advance. ${d.questions.length} questions.</p><div class="kc-meta"><div class="kc-m"><strong>${d.questions.length}</strong> questions</div><div class="kc-m">Pass: <strong>${ps}%</strong></div>${es!==null?`<div class="kc-m">Previous: <strong>${es}%</strong></div>`:''}</div></div>
    ${ap?`<div class="kc-res pass"><h3>✓ Already passed — ${es}%</h3><p>Retake below to review.</p></div>`:''}
    ${qh}
    <div class="kc-sub"><button class="btn btn-gold" onclick="submitKC(${i})">Submit Answers</button><span style="font-size:11px;color:var(--muted)">Answer all questions before submitting.</span></div>
    <div class="kc-res" id="kcr"></div>`;
  window._kca={};
}

function kcSel(qi,oi,di){
  DAYS[di].questions[qi].opts.forEach((_,x)=>{const e=document.getElementById(`ko_${qi}_${x}`);if(e)e.classList.remove('sel');});
  const e=document.getElementById(`ko_${qi}_${oi}`);if(e)e.classList.add('sel');
  window._kca[qi]=oi;
  const b=document.getElementById(`kqb_${qi}`);if(b)b.classList.add('ans');
}

function submitKC(i){
  const d=DAYS[i];const ps=d.kcPassScore||80;let correct=0;
  d.questions.forEach((q,qi)=>{
    const sel=window._kca[qi];
    q.opts.forEach((_,oi)=>{const e=document.getElementById(`ko_${qi}_${oi}`);if(e){e.classList.remove('sel');if(oi===q.ans)e.classList.add('right');else if(oi===sel&&sel!==q.ans)e.classList.add('wrong');}});
    const b=document.getElementById(`kqb_${qi}`);if(b){b.classList.remove('ans');if(sel===q.ans){b.classList.add('cor');correct++;}else b.classList.add('inc');}
  });
  const pct=Math.round((correct/d.questions.length)*100);setKC(i,pct);
  const passed=pct>=ps;
  const r=document.getElementById('kcr');
  r.className='kc-res '+(passed?'pass':'fail');
  r.innerHTML=passed
    ?`<h3>✓ Passed — ${pct}% (${correct}/${d.questions.length})</h3><p>${i<DAYS.length-1?'You may advance to the next section.':'Program complete. You are cleared for deployment.'}</p>`
    :`<h3>✗ Not Passed — ${pct}% (${correct}/${d.questions.length})</h3><p>Need ${ps}%. Review highlighted answers and course content, then retake.</p>`;
  r.scrollIntoView({behavior:'smooth',block:'nearest'});
  renderSB();updateProg();
}

function goNext(){if(cur===null)showDay(0);else if(cur<DAYS.length-1)showDay(cur+1);}
renderSB();updateProg();showHome();
</script>
</body>
</html>
