<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FWC26 Transport Coordinator Training Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap');
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-dim:#7a6228;--black:#0a0a0a;--dark:#111111;--dark2:#1a1a1a;--dark3:#222222;--green:#1a5c2a;--green-light:#2d8a42;--white:#f5f5f0;--muted:#999;--border:#2a2a2a;--success:#2d8a42;--danger:#c0392b;--info:#2980b9}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);display:flex;height:100vh;overflow:hidden}
#sidebar{width:272px;min-width:272px;background:var(--dark);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:18px 16px 14px;border-bottom:1px solid var(--border);background:var(--dark2)}
.sb-logo{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:3px}
.sb-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:var(--white);line-height:1.1;text-transform:uppercase}
.prog-wrap{margin-top:10px;padding:9px 11px;background:var(--dark3);border-radius:6px;border:1px solid var(--border)}
.prog-row{font-size:11px;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:2px;transition:width .5s}
.time-est{font-size:10px;color:var(--gold);margin-top:2px}
#sb-nav{flex:1;overflow-y:auto;padding:6px 0}
#sb-nav::-webkit-scrollbar{width:3px}
#sb-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.wk-grp{margin-bottom:2px}
.wk-hdr{padding:7px 16px 5px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:7px}
.wk-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.day-row{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;transition:background .15s;position:relative}
.day-row:hover{background:var(--dark2)}
.day-row.active{background:rgba(201,168,76,.08)}
.day-row.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
.d-num{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted);min-width:22px}
.day-row.active .d-num{color:var(--gold)}
.d-lbl{font-size:11px;color:#ccc;line-height:1.3;flex:1}
.day-row.active .d-lbl{color:var(--white);font-weight:500}
.d-ico{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:8px}
.d-ico.done{background:var(--success);border-color:var(--success);color:white}
.d-ico.kc{border-color:var(--gold);color:var(--gold);font-size:7px;font-weight:700}
.d-ico.recap{border-color:var(--info);color:#5dade2;font-size:7px;font-weight:700}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{padding:12px 28px;border-bottom:1px solid var(--border);background:var(--dark);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.bc{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.bc span{color:var(--gold)}
.acts{display:flex;gap:8px}
.btn{font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:6px 14px;border-radius:4px;cursor:pointer;border:none;transition:all .15s}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--muted);color:var(--white)}
.btn-gold{background:var(--gold);color:var(--black)}
.btn-gold:hover{background:var(--gold-light)}
.btn-green{background:var(--green);color:var(--white)}
.btn-green:hover{background:var(--green-light)}
#ca{flex:1;overflow-y:auto;padding:32px 44px}
#ca::-webkit-scrollbar{width:5px}
#ca::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* LESSON */
.l-intro{background:linear-gradient(135deg,rgba(201,168,76,.06),rgba(201,168,76,.02));border:1px solid rgba(201,168,76,.2);border-left:3px solid var(--gold);border-radius:10px;padding:22px 26px;margin-bottom:26px}
.l-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.l-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;text-transform:uppercase;line-height:1;color:var(--white);margin-bottom:8px}
.l-why{font-size:13px;color:#bbb;line-height:1.65;margin-bottom:10px}
.l-time{font-size:11px;color:var(--gold);opacity:.8}
.l-obj{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.obj-p{font-size:11px;background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:3px 10px}

.sb{margin-bottom:26px}
.sb h2{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.sb h3{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#bbb;margin:14px 0 8px}
.sb p{font-size:14px;line-height:1.75;color:#ccc;margin-bottom:10px}
.sb p strong{color:var(--white)}

.bl{list-style:none;margin-bottom:10px}
.bl li{padding:6px 0 6px 16px;font-size:13px;color:#ccc;line-height:1.55;border-bottom:1px solid rgba(255,255,255,.04);position:relative}
.bl li::before{content:'›';position:absolute;left:0;color:var(--gold);font-size:15px;line-height:1.3}
.bl li strong{color:var(--white)}

.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-bottom:10px}
.ic{background:var(--dark2);border:1px solid var(--border);border-radius:7px;padding:12px 14px}
.ic-l{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.ic-v{font-size:13px;font-weight:500;color:var(--white);line-height:1.4}

.callout{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-left:3px solid var(--gold);border-radius:6px;padding:12px 15px;margin-bottom:14px}
.cl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.callout p,.callout-d p,.callout-i p{font-size:13px;color:#ccc;line-height:1.6;margin-bottom:0}
.callout-d{background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.2);border-left:3px solid var(--danger);border-radius:6px;padding:12px 15px;margin-bottom:14px}
.callout-d .cl{color:#e88}
.callout-i{background:rgba(41,128,185,.07);border:1px solid rgba(41,128,185,.2);border-left:3px solid var(--info);border-radius:6px;padding:12px 15px;margin-bottom:14px}
.callout-i .cl{color:#7ec8e3}

.dt{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:13px}
.dt th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);padding:7px 11px;border-bottom:1px solid var(--border);text-align:left}
.dt td{padding:8px 11px;border-bottom:1px solid var(--border);color:#ccc;vertical-align:top}
.dt tr:hover td{background:var(--dark2)}

.flow{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.fs{display:flex;gap:12px;padding:10px 14px;background:var(--dark2);border:1px solid var(--border);border-radius:6px}
.fn{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--gold);line-height:1;min-width:20px}
.ft{font-size:13px;font-weight:600;color:var(--white);margin-bottom:2px}
.fd{font-size:12px;color:var(--muted);line-height:1.5}

.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:7px;margin-bottom:12px}
.ti{background:var(--dark2);border:1px solid var(--border);border-radius:5px;padding:9px 12px;display:flex;align-items:baseline;gap:8px}
.ta{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--gold);min-width:68px;flex-shrink:0}
.td{font-size:12px;color:#bbb;line-height:1.4}

/* SCENARIO */
.sc-box{background:var(--dark3);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:16px 18px;margin-bottom:14px}
.sc-hd{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sc-hd::before{content:'';display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%}
.sc-body{font-size:13px;color:#ccc;line-height:1.65;margin-bottom:10px}
.sc-q{font-size:13px;font-weight:600;color:var(--white);margin:10px 0 8px}
.sc-opts{display:flex;flex-direction:column;gap:6px}
.sc-c{padding:9px 13px;background:var(--dark2);border:1px solid var(--border);border-radius:5px;font-size:13px;color:#ccc;cursor:pointer;transition:all .15s}
.sc-c:hover{border-color:var(--gold-dim);color:var(--white)}
.sc-c.sc-right{border-color:var(--success);background:rgba(45,138,66,.1);color:#7ddc96;pointer-events:none}
.sc-c.sc-wrong{border-color:var(--danger);background:rgba(192,57,43,.1);color:#e88;pointer-events:none}
.sc-c.sc-off{pointer-events:none}
.sc-exp{display:none;margin-top:8px;font-size:12px;color:#aaa;line-height:1.55;padding:10px 12px;background:var(--dark2);border-radius:5px;border-left:2px solid var(--gold)}

/* CONVOY */
.conv-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin:8px 0}
.cv{background:var(--dark3);border:1px solid var(--border);border-radius:4px;padding:4px 9px;font-size:11px;color:#ccc;white-space:nowrap}
.cv.pol{border-color:#3498db;color:#7ec8e3}
.cv.bus{border-color:var(--gold);color:var(--gold-light)}
.cv.rc{border-color:#8b4db8;color:#c49de8;border-style:dashed}
.cv-a{color:var(--muted);font-size:12px}

/* TAKEAWAYS */
.tak-box{background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin:24px 0 20px}
.tak-hdr{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.tak-hdr::before{content:'★';font-size:10px}
.tak-ul{list-style:none}
.tak-ul li{font-size:13px;color:#ddd;padding:6px 0 6px 20px;border-bottom:1px solid rgba(255,255,255,.05);position:relative;line-height:1.55}
.tak-ul li::before{content:'✓';position:absolute;left:0;color:var(--success);font-size:11px;line-height:1.8}
.tak-ul li:last-child{border-bottom:none}
.tak-ul li strong{color:var(--white)}

/* MINI QUIZ */
.mq{background:var(--dark);border:1px solid rgba(201,168,76,.25);border-radius:10px;padding:20px 22px;margin-top:22px}
.mq-hdr{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.mq-hdr::before{content:'?';width:18px;height:18px;background:rgba(201,168,76,.2);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.mq-q{margin-bottom:16px}
.mq-qtxt{font-size:14px;font-weight:500;color:var(--white);margin-bottom:10px;line-height:1.5}
.mq-opts{display:flex;flex-direction:column;gap:6px}
.mo{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;background:var(--dark2);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:13px;color:#ccc;transition:all .15s;line-height:1.4}
.mo:hover{border-color:var(--gold-dim);color:var(--white);background:rgba(201,168,76,.05)}
.mo.sel{border-color:var(--gold);background:rgba(201,168,76,.08);color:var(--white)}
.mo.r{border-color:var(--success);background:rgba(45,138,66,.1);color:#7ddc96;pointer-events:none}
.mo.w{border-color:var(--danger);background:rgba(192,57,43,.1);color:#e88;pointer-events:none}
.ml{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--muted);min-width:16px;flex-shrink:0;margin-top:1px}
.mo.sel .ml{color:var(--gold)}.mo.r .ml{color:var(--success)}.mo.w .ml{color:var(--danger)}
.mq-exp{display:none;font-size:12px;color:#aaa;line-height:1.55;padding:8px 12px;background:var(--dark2);border-radius:5px;border-left:2px solid var(--gold);margin-top:6px}
.mq-acts{display:flex;align-items:center;gap:12px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.mq-res{display:none;margin-top:14px;padding:12px 16px;border-radius:7px;font-size:13px}
.mq-res.pass{display:block;background:rgba(45,138,66,.1);border:1px solid rgba(45,138,66,.3);color:#7ddc96}
.mq-res.fail{display:block;background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);color:#e88}
.mq-res h4{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;margin-bottom:4px}

.done-bar{display:flex;align-items:center;justify-content:space-between;background:var(--dark2);border:1px solid var(--border);border-radius:7px;padding:12px 18px;margin-top:24px}
.done-bar p{font-size:12px;color:var(--muted)}

/* RECAP */
.rec-ban{background:linear-gradient(135deg,rgba(41,128,185,.1),rgba(41,128,185,.03));border:1px solid rgba(41,128,185,.3);border-left:3px solid var(--info);border-radius:10px;padding:20px 24px;margin-bottom:24px}
.rec-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#7ec8e3;margin-bottom:5px}
.rec-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;color:var(--white);margin-bottom:5px}
.rec-desc{font-size:13px;color:#aaa;line-height:1.6}

/* KC */
.kc-ban{background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.03));border:1px solid rgba(201,168,76,.3);border-radius:10px;padding:22px 26px;margin-bottom:24px;position:relative;overflow:hidden}
.kc-ban::before{content:'KC';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:800;color:rgba(201,168,76,.05);line-height:1}
.kc-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.kc-ban h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;text-transform:uppercase;color:var(--white);margin-bottom:6px}
.kc-ban p{font-size:13px;color:#aaa;max-width:520px}
.kc-meta{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.kc-m{font-size:11px;color:var(--muted)}.kc-m strong{color:var(--gold)}
.kc-qb{background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:14px;transition:border-color .2s}
.kc-qb.ans{border-color:rgba(201,168,76,.2)}.kc-qb.cor{border-color:rgba(45,138,66,.4)}.kc-qb.inc{border-color:rgba(192,57,43,.4)}
.kc-qn{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.kc-qt{font-size:14px;font-weight:500;color:var(--white);line-height:1.5;margin-bottom:13px}
.kc-os{display:flex;flex-direction:column;gap:7px}
.ko{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;background:var(--dark3);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:13px;color:#ccc;transition:all .15s;line-height:1.4}
.ko:hover{border-color:var(--gold-dim);color:var(--white);background:rgba(201,168,76,.05)}
.ko.sel{border-color:var(--gold);background:rgba(201,168,76,.08);color:var(--white)}
.ko.right{border-color:var(--success);background:rgba(45,138,66,.1);color:var(--white)}
.ko.wrong{border-color:var(--danger);background:rgba(192,57,43,.1);color:#aaa}
.kl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--muted);min-width:16px;flex-shrink:0;margin-top:1px}
.ko.sel .kl{color:var(--gold)}.ko.right .kl{color:var(--success)}.ko.wrong .kl{color:var(--danger)}
.kc-sub{display:flex;align-items:center;gap:14px;margin-top:20px;padding-top:18px;border-top:1px solid var(--border)}
.kc-res{display:none;padding:16px 20px;border-radius:8px;margin-top:18px;font-size:13px}
.kc-res.pass{display:block;background:rgba(45,138,66,.1);border:1px solid rgba(45,138,66,.3);color:#7ddc96}
.kc-res.fail{display:block;background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);color:#e88}
.kc-res h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;margin-bottom:5px}

/* HOME */
.hh{padding:42px 0 32px;border-bottom:1px solid var(--border);margin-bottom:32px}
.hh-ey{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.hh h1{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:800;text-transform:uppercase;line-height:.95;color:var(--white);margin-bottom:14px}
.hh h1 em{color:var(--gold);font-style:normal}
.hh p{font-size:14px;color:#999;max-width:580px;line-height:1.6}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px}
.sc{background:var(--dark2);border:1px solid var(--border);border-radius:7px;padding:14px;text-align:center}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--gold);line-height:1;margin-bottom:3px}
.sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.wcs{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:28px}
.wc{background:var(--dark2);border:1px solid var(--border);border-radius:9px;padding:18px 20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.wc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.w1::before{background:#3a8fd4}.w2::before{background:#2d8a42}.w3::before{background:var(--gold)}
.w4::before{background:#8b4db8}.w5::before{background:#c0392b}.w6::before{background:#16a085}
.wc:hover{border-color:var(--gold-dim);transform:translateY(-1px)}
.wc-n{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.wc-t{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;color:var(--white);margin-bottom:6px;line-height:1.1}
.wc-d{font-size:11px;color:var(--muted);line-height:1.5}
.wc-p{margin-top:12px;display:flex;align-items:center;gap:8px}
.wc-b{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.wc-f{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
.wc-pc{font-size:10px;color:var(--muted);min-width:28px;text-align:right}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.rc{background:var(--dark2);border:1px solid var(--border);border-radius:7px;padding:12px 14px}
.rc h4{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.rc ul{list-style:none}
.rc ul li{font-size:12px;color:#bbb;padding:3px 0 3px 10px;border-bottom:1px solid rgba(255,255,255,.04);position:relative;line-height:1.4}
.rc ul li::before{content:'·';position:absolute;left:0;color:var(--gold)}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sb-head">
    <div class="sb-logo">FIFA World Cup 2026™</div>
    <div class="sb-title">TC Training<br>Portal</div>
    <div class="prog-wrap">

{week:0,day:1,type:'lesson',title:'FWC26 & Your Role',tag:'Week 1 · Day 1',time:'~35 min',

content:()=>`
<div class="sb"><h2>A Tournament of Firsts</h2>
<p>FWC26 is the largest FIFA World Cup in history. For the first time, <strong>48 teams</strong> compete — up from 32 — creating a new Round of 32 and extending the tournament to 39 days. Three nations host: the United States, Canada, and Mexico, with 16 host cities and 104 total matches.</p>
<div class="ig">
<div class="ic"><div class="ic-l">Duration</div><div class="ic-v">39 days · June 11 – July 19, 2026</div></div>
<div class="ic"><div class="ic-l">Teams</div><div class="ic-v">48 national teams</div></div>
<div class="ic"><div class="ic-l">Host Cities</div><div class="ic-v">16 (11 USA · 3 Mexico · 2 Canada)</div></div>
<div class="ic"><div class="ic-l">Matches</div><div class="ic-v">104 total</div></div>
<div class="ic"><div class="ic-l">Team Base Camps</div><div class="ic-v">48 across North America</div></div>
<div class="ic"><div class="ic-l">Tournament Format</div><div class="ic-v">12 groups of 4 → R32 → R16 → QF → SF → Final</div></div>
</div></div>
<div class="sb"><h2>Your Role as Transport Coordinator</h2>
<p>The TC is the primary on-site operational contact at the Team Base Camp Hotel (TBCH) or Venue-Specific Training Hotel (VSTH). Every team movement — from the tarmac to the hotel, the hotel to training, training to the stadium — runs through you. You are not support staff. You are the operational engine.</p>
<div class="callout"><div class="cl">What FT-4 means in practice</div><p>Vehicles staged 60 minutes early. Every driver briefed before every shift. Load zones clear before the team arrives. Accreditation checked before every boarding on MD-1 and MD. No exceptions, no shortcuts. When you accept the FT-4 standard, you accept it completely.</p></div>
<div class="ig">
<div class="ic"><div class="ic-l">Your location</div><div class="ic-v">Stationed at TBCH or VSTH throughout assignment</div></div>
<div class="ic"><div class="ic-l">Primary contacts</div><div class="ic-v">TLO and TSLO — daily face-to-face briefing required</div></div>
<div class="ic"><div class="ic-l">Reporting to</div><div class="ic-v">Cluster Supervisor (field) → CS Supervisor → CS Manager</div></div>
<div class="ic"><div class="ic-l">Key outputs</div><div class="ic-v">Fleet management, driver management, A&D coordination, daily report</div></div>
</div></div>
<div class="sb"><h2>Scenario Practice</h2>
<div class="sc-box"><div class="sc-hd">First day on the ground</div>
<div class="sc-body">You've just arrived at your assigned TBCH. Your team doesn't arrive for 4 days (MD-5). The TLO introduces themselves and immediately asks you to arrange transport for the team's family members who are flying in tomorrow — about 20 people, heading to the hotel. "It's just one run," they say.</div>
<div class="sc-q">What is your response?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">Arrange the transport — it's a reasonable first request and a good way to build the relationship.</div>
<div class="sc-c" onclick="sc(this,'w')">Check with your Supervisor first, but it's probably fine.</div>
<div class="sc-c" onclick="sc(this,'r')">Politely decline — FIFA transport services are for the official delegation only. F&F arrange their own transport through external providers. Redirect the TLO to Team Services for any F&F-related questions.</div>
<div class="sc-c" onclick="sc(this,'w')">Arrange it this once, but explain it can't happen again.</div>
</div>
<div class="sc-exp">F&F (Family & Friends) are explicitly excluded from all FIFA transport services. Rate Card vehicles are for the official delegation only. This is not a judgment call — it is policy. Politely redirect: "F&F arrange their own transport through external providers. I can put you in touch with Team Services if you have questions about F&F logistics." This boundary must be held from day one.</div>
</div>
<div class="sc-box"><div class="sc-hd">Understanding the match schedule</div>
<div class="sc-body">Your team's group stage schedule: Match 1 is June 17 in Dallas. Match 2 is June 22 in Atlanta. Match 3 is June 27 in Dallas. Their TBC is in Fort Worth. Transport service for Match 1 begins on MD-5.</div>
<div class="sc-q">On what date does transport service begin for this team's Match 1?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">June 12 — 5 days before the tournament starts</div>
<div class="sc-c" onclick="sc(this,'r')">June 12 — MD-5 counting back from June 17</div>
<div class="sc-c" onclick="sc(this,'w')">June 14 — 3 days before Match 1</div>
<div class="sc-c" onclick="sc(this,'w')">June 15 — the day after the tournament opens</div>
</div>
<div class="sc-exp">MD-5 for a June 17 match = June 12. Count back 5 days from the match date. June 17 → June 16 (MD-1) → June 15 (MD-2) → June 14 (MD-3) → June 13 (MD-4) → June 12 (MD-5). Service begins June 12 and runs through June 19 (MD+2) for Match 1.</div>
</div></div>`},

quiz:[
{q:'A team is at their group stage home base. They travel to training. This movement is:',opts:['VSTH → VSTS','TBCH → TBCTS','TBCH → VSTH','VSTH → TBCTS'],ans:1,exp:'TBCH = group stage hotel. TBCTS = group stage training ground. Daily training runs are TBCH ↔ TBCTS. The VSTH and VSTS are only used when the team travels to a host city for a match.'},
{q:'What does ACS stand for, and when are they present?',opts:['Airport Control Services — all arrivals','Air Charter Services — charter departures and international arrivals only','Air Convoy Services — all team convoys','Arrivals & Customs Support — international flights only'],ans:1,exp:'ACS = Air Charter Services. They are on-site at charter departure airports and international charter arrivals. They are NOT present for domestic charter arrivals — the TC handles those independently.'},
{q:'Which abbreviation refers to the secure zone at a training site where VAPPs are verified?',opts:['FBO','IBC','VSA','TROC'],ans:2,exp:'VSA = Vehicle-Specific Area. This is the secure zone at training sites (TBCTS and VSTS) where Security (SEC) verifies VAPPs before allowing vehicles to enter.'},
{q:'IFES is best described as:',opts:['The app drivers use to receive jobs and navigation','The single source of truth for transport operations','The authoritative source for PMA A&D data — feeds TMM every 15 minutes','The FIFA system for accreditation management'],ans:2,exp:'IFES = Integrated Football and Event System. It is the authoritative source for all PMA arrival and departure information, integrating directly into TMM every 15 minutes.'},
{q:'A TLO says: "PMA departs TBCH → TBCTS at 09:00, returns 12:00. Then VSTH-bound MD-1 at 15:00." What does this mean?',opts:['Team goes to training at 9am, returns at noon, then a random event at 3pm','Team goes to training at 9am, returns noon. On the day before the match, they travel to the host city hotel at 3pm.','Team trains twice — first at the home training ground, then at the host city training ground','Team departs base camp entirely at 3pm'],ans:1,exp:'TBCH → TBCTS = morning training run (home base). VSTH-bound MD-1 = the team\'s travel to the host city hotel on the day before the match. This is two separate movements: a daily training session and then a match-trip intercity departure.'},
{q:'What is the difference between a COM VAPP and an F&F VAPP?',opts:['COM VAPPs are digital; F&F VAPPs are printed','COM VAPPs allow inner secure perimeter access; F&F VAPPs allow parking outside the perimeter only','COM VAPPs are for players; F&F VAPPs are for team officials','There is no difference — they provide the same access'],ans:1,exp:'COM VAPPs = Competition VAPPs. They are printed, displayed lower right corner of the front windscreen, and provide access to the inner secure perimeter at stadiums and training sites. F&F VAPPs are for Family & Friends parking outside the stadium security perimeter — no inner perimeter access.'},
],
content:()=>`
<div class="sb"><h2>Timeline Abbreviations</h2>
<div class="tg">
<div class="ti"><span class="ta">MD</span><span class="td">Match Day — the day of the game</span></div>
<div class="ti"><span class="ta">MD-1</span><span class="td">Day before Match Day (often travel to VSTH)</span></div>
<div class="ti"><span class="ta">MD-2</span><span class="td">Two days before Match Day</span></div>
<div class="ti"><span class="ta">MD-5</span><span class="td">Five days before first match — transport service begins, police escort window opens</span></div>
<div class="ti"><span class="ta">MD+1</span><span class="td">Day after Match Day (often return travel to TBCH)</span></div>
<div class="ti"><span class="ta">MD+2</span><span class="td">Two days after final match — transport service ends</span></div>
</div></div>
<div class="sb"><h2>Site & Infrastructure Abbreviations</h2>
<div class="tg">
<div class="ti"><span class="ta">TBC</span><span class="td">Team Base Camp — the full group stage setup (hotel + training + airport)</span></div>
<div class="ti"><span class="ta">TBCH</span><span class="td">Team Base Camp Hotel — group stage home hotel</span></div>
<div class="ti"><span class="ta">TBCTS</span><span class="td">Team Base Camp Training Site — group stage training ground</span></div>
<div class="ti"><span class="ta">VSTH</span><span class="td">Venue-Specific Training Hotel — hotel for match trips to host cities</span></div>
<div class="ti"><span class="ta">VSTS</span><span class="td">Venue-Specific Training Site — training ground at host city during match trip</span></div>
<div class="ti"><span class="ta">HC</span><span class="td">Host City</span></div>
<div class="ti"><span class="ta">FBO</span><span class="td">Fixed-Base Operator — private aviation terminal (used for charter flights)</span></div>
<div class="ti"><span class="ta">VSA</span><span class="td">Vehicle-Specific Area — secure entry zone at venues where VAPPs are verified</span></div>
<div class="ti"><span class="ta">IBC</span><span class="td">International Broadcast Centre</span></div>
</div>
<div class="callout"><div class="cl">The four-way distinction you must master</div><p>TBCH = group stage hotel. TBCTS = group stage training ground. VSTH = match-trip hotel. VSTS = match-trip training ground. You will use all four in the same sentence. Getting them mixed up in a run sheet or TMM entry causes real operational failures downstream.</p></div>
</div>
<div class="sb"><h2>People, Systems & Permits</h2>
<div class="tg">
<div class="ti"><span class="ta">TC</span><span class="td">Transport Coordinator — your role</span></div>
<div class="ti"><span class="ta">TLO</span><span class="td">Team Liaison Officer — primary daily counterpart</span></div>
<div class="ti"><span class="ta">TSLO</span><span class="td">Team Security Liaison Officer — security authority for all movements</span></div>
<div class="ti"><span class="ta">ACS</span><span class="td">Air Charter Services — present at charter departures and international arrivals</span></div>
<div class="ti"><span class="ta">AND</span><span class="td">FIFA Arrivals & Departures team — operates at airports</span></div>
<div class="ti"><span class="ta">VTM</span><span class="td">Venue Transportation Manager — manages transport at the stadium</span></div>
<div class="ti"><span class="ta">IFES</span><span class="td">Integrated Football and Event System — authoritative A&D data source, feeds TMM every 15 min</span></div>
<div class="ti"><span class="ta">TMM</span><span class="td">Transport Management Module — single source of truth for all transport operations</span></div>
<div class="ti"><span class="ta">TROC</span><span class="td">Transportation Operations Center</span></div>
<div class="ti"><span class="ta">VAPP</span><span class="td">Vehicle Access and Parking Pass</span></div>
<div class="ti"><span class="ta">COM VAPP</span><span class="td">Competition VAPP — inner secure perimeter access. Printed, lower right windscreen. Non-transferable.</span></div>
<div class="ti"><span class="ta">F&F VAPP</span><span class="td">Family & Friends VAPP — outside perimeter parking only</span></div>
<div class="ti"><span class="ta">SLA</span><span class="td">Service Level Agreement</span></div>
<div class="ti"><span class="ta">DSLA</span><span class="td">Detailed Service Level Agreement — the full PMA transport document</span></div>
<div class="ti"><span class="ta">PMA</span><span class="td">Participating Member Association — a national team</span></div>
<div class="ti"><span class="ta">TPT</span><span class="td">Transport Functional Area</span></div>
<div class="ti"><span class="ta">SEC</span><span class="td">Security Functional Area — verifies VAPPs at VSAs</span></div>
<div class="ti"><span class="ta">LOG</span><span class="td">Logistics Functional Area — equipment trucks and kit movement</span></div>
<div class="ti"><span class="ta">TSV</span><span class="td">FIFA Team Services — manages PMA relationships, administers Rate Card portal</span></div>
</div></div>
<div class="sb"><h2>Scenario Practice — Abbreviations in Operational Context</h2>
<div class="sc-box"><div class="sc-hd">Decode the movement brief</div>
<div class="sc-body">You receive the following in a WhatsApp message from your TLO: <em>"Confirmed MD-1: TBCH → TBC airport (FBO). ACS on site. Domestic charter. Then VSTH-bound. COM VAPP on fleet. TSLO coordinating escort. Confirm driver briefing done."</em></div>
<div class="sc-q">What does this brief tell you needs to happen?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">Team is going to the stadium tomorrow with police escort.</div>
<div class="sc-c" onclick="sc(this,'r')">On the day before the match, the team departs their group stage hotel to the TBC airport (which is an FBO/private terminal). ACS is there. It's a domestic charter flight. Team then goes to the host city hotel. All official vehicles need COM VAPPs displayed. TSLO is coordinating police escort. You need to confirm your drivers have been briefed.</div>
<div class="sc-c" onclick="sc(this,'w')">Team is arriving at the FBO tomorrow. ACS will handle everything.</div>
<div class="sc-c" onclick="sc(this,'w')">A domestic flight is arriving at the TBC. TSLO handles the convoy.</div>
</div>
<div class="sc-exp">Full decode: MD-1 = tomorrow (day before the match). TBCH → TBC airport = the team departs their group stage hotel to the base camp airport. FBO = it's a private aviation terminal, not a commercial terminal. ACS on site = Air Charter Services will be there. Domestic charter = no passport/immigration processing needed. VSTH-bound = they fly to the host city hotel. COM VAPP on fleet = all official vehicles need their competition parking passes displayed. TSLO coordinating escort = police escort confirmed through security. Confirm driver briefing = you need to verify your drivers know the plan.</div>
</div></div>`},

<div class="sb"><h2>Scenario Practice</h2>
<div class="sc-box"><div class="sc-hd">Wrong airport, right city</div>
<div class="sc-body">It's MD-1. Your team is departing from their TBC in New Jersey. IFES shows their charter flight departs from Teterboro (TEB) at 14:00. You've staged the team convoy at the commercial terminal at Newark (EWR) because "TEB and EWR are both in New Jersey." It's 11:30.</div>

</div>
<div class="sc-exp">TEB (Teterboro) is a private FBO terminal requiring tarmac procedures — completely different from EWR which is a commercial terminal. The staging location, access roads, security protocols, and convoy positioning are entirely different. You restage immediately to TEB, notify your Supervisor of the error (early transparency), re-brief your drivers on FBO procedures, and confirm TSLO knows the correct location for escort coordination. At 11:30 with a 14:00 departure you have time to fix this — but you must act immediately.</div>
</div></div>`},

content:()=>`
<div class="sb"><h2>The Team Base Camp Structure</h2>
<p>Every one of the 48 PMAs is assigned a dedicated Team Base Camp for the group stage and potentially R32. The TBC provides a complete operational home.</p>
<div class="ig">
<div class="ic"><div class="ic-l">TBCH</div><div class="ic-v">Team Base Camp Hotel — the team's group stage home. You are stationed here as TC.</div></div>
<div class="ic"><div class="ic-l">TBCTS</div><div class="ic-v">Team Base Camp Training Site — where the team trains during the group stage. Regular daily shuttle from TBCH.</div></div>
<div class="ic"><div class="ic-l">TBC Airport</div><div class="ic-v">Designated airport for A&D at the base camp. May be commercial or an FBO depending on location.</div></div>
</div></div>
<div class="sb"><h2>Real TBC-to-Host-City Movement Examples</h2>
<p>These are real movements from the official DSLA. Study the pattern: team travels from TBCH (usually MD-2 or MD-1) to a VSTH near the match stadium, plays the match (MD), and returns to TBCH (MD or MD+1).</p>
<table class="dt"><thead><tr><th>Team</th><th>Direction</th><th>From</th><th>To</th></tr></thead><tbody>
<tr><td>ESP</td><td>MD-1 outbound</td><td>Embassy Suites, Chattanooga (TBCH)</td><td>The Whitley, Atlanta (VSTH)</td></tr>
<tr><td>ESP</td><td>MD+1 return</td><td>The Whitley, Atlanta (VSTH)</td><td>Embassy Suites, Chattanooga (TBCH)</td></tr>
<tr><td>USA</td><td>MD-1 outbound</td><td>Ritz Carlton Laguna Niguel, Dana Point (TBCH)</td><td>Westdrift Manhattan Beach (VSTH)</td></tr>
<tr><td>BRA</td><td>MD-1 outbound</td><td>The Ridge, NY/NJ area (TBCH)</td><td>Westin Jersey City (VSTH)</td></tr>
<tr><td>PAN</td><td>MD-1 outbound</td><td>Nottawasaga Inn, New Tecumseth (TBCH)</td><td>Omni King Edward, Toronto (VSTH)</td></tr>
<tr><td>CRO</td><td>MD-1 outbound</td><td>Hotel AKA, Alexandria, VA (TBCH)</td><td>The Notary, Philadelphia (VSTH)</td></tr>
<tr><td>RSA</td><td>MD-2 outbound</td><td>Camino Real, Pachuca (TBCH)</td><td>Westin Santa Fe, Mexico City (VSTH)</td></tr>
</tbody></table></div>
<div class="sb"><h2>The Driver Return Rule</h2>
<p>When a team travels from their TBCH to a VSTH by road, the TBCH light duty fleet drivers make the trip and then return. The handoff is clean:</p>
<div class="flow">
<div class="fs"><div class="fn">1</div><div><div class="ft">TBCH TC stages convoy, team departs</div><div class="fd">Convoy drives from TBCH to VSTH. TBCH TC has coordinated the trip and briefed drivers.</div></div></div>
<div class="fs"><div class="fn">2</div><div><div class="ft">TBCH light duty drivers return to TBCH</div><div class="fd">Immediately after drop-off at VSTH. Driver must be within the 16-hour shift limit for the return journey. Fuel and rest stop if needed.</div></div></div>
<div class="fs"><div class="fn">3</div><div><div class="ft">VSTH fleet takes over</div><div class="fd">From drop-off at VSTH, the host city fleet handles all local movements: VSTH ↔ VSTS, VSTH ↔ stadium.</div></div></div>
</div>
<div class="callout-d"><div class="cl">Shift limit — hard rule</div><p>Drivers are strictly prohibited from exceeding the 16-hour shift limit for road intercity movements under any circumstances. If the round trip (TBCH → VSTH → TBCH) plus any time on-site would exceed 16 hours, the return may need to be split or handled differently. Plan for this before the movement, not during it.</p></div>
</div>
<div class="sb"><h2>Scenario Practice</h2>
<div class="sc-box"><div class="sc-hd">Intercity movement planning</div>
<div class="sc-body">Your team's TBC is in Monterrey, Mexico. Their group stage match is in Mexico City. The drive from Monterrey to Mexico City is approximately 5.5–6 hours. The distance makes it a charter flight operation. Your team departs MD-2. ACS will be on-site at Monterrey's MTY airport for the charter departure.</div>
<div class="sc-q">Which of the following statements about this movement is correct?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">ACS will be present at Mexico City for the arrival, since it's an international flight between two countries.</div>
<div class="sc-c" onclick="sc(this,'r')">ACS is present at the MTY departure. For the Mexico City arrival: it is a domestic Mexican flight (Monterrey to Mexico City, within Mexico), so ACS is NOT present at the arrival. The TC at the Mexico City VSTH handles the arrival independently.</div>
<div class="sc-c" onclick="sc(this,'w')">ACS is present at both departure and arrival — they cover all charter movements.</div>
<div class="sc-c" onclick="sc(this,'w')">This is an international flight since Mexico City is a different state, so ACS covers both ends.</div>
</div>
<div class="sc-exp">ACS covers charter departures and international charter arrivals. A flight from Monterrey to Mexico City is domestic within Mexico — not international. Therefore ACS is present at the MTY departure, but NOT at MEX on arrival. The receiving TC at the Mexico City VSTH handles the domestic arrival independently. This is a critical distinction — if you expect ACS and they aren't there, your arrival coordination breaks down.</div>
</div></div>`},

{week:1,day:6,type:'lesson',title:'IFES, TMM & the Information Flow',tag:'Week 2 · Day 1',time:'~40 min',
why:'Every staging decision starts with data. IFES feeds TMM, TMM feeds drivers, and drivers move your team. A break anywhere in that chain — a missed 17:00 confirmation, an unupdated schedule, a dead tablet — becomes a movement failure.',
obj:['Understand the IFES → TMM → FIFA Drive App data flow','Execute the 17:00 rule and know what happens when it isn\'t met','Know what every level of TMM access sees'],
takes:['IFES = authoritative source for all PMA A&D data. It integrates directly into TMM, auto-refreshing flight status every 15 minutes.','<strong>17:00 rule:</strong> TLO must confirm the team schedule in IFES by 17:00 local time the day before service. Follow up at 16:30 if not done.','PMAs must submit flight information at least 30 days before arrival for airport services to be activated.','<strong>TMM is the single source of truth.</strong> Every schedule change must be updated in TMM — verbal changes do not exist operationally.','You use TMM Lite on your tablet. Drivers use the FIFA Drive App. Event Managers have full TMM access.','If your tablet\'s TMM Lite is not loading before a critical movement, that is a pre-shift device failure — alert Supervisor before assuming the shift.'],
quiz:[
{q:'A TLO verbally tells you the team training will move from 09:00 to 11:00 tomorrow. What must you do?',opts:['Update your personal notes and brief drivers verbally tomorrow morning','Update TMM immediately — verbal changes are not operational until in the system','Send a WhatsApp to all drivers and consider it done','Wait to see if the TLO confirms it in writing before updating anything'],ans:1,exp:'If it isn\'t in TMM, it doesn\'t exist operationally. Drivers use the FIFA Drive App (integrated with TMM) to receive their jobs and timing. A verbal change that isn\'t updated in TMM means your drivers have the wrong information.'},
{q:'It is 16:50. Tomorrow is MD-1 — a critical match-trip movement. The TLO has not confirmed in IFES. What is the correct action?',opts:['Wait until 17:01 to see if it appears before escalating','Attempt direct contact with TLO AND simultaneously notify your Supervisor that confirmation is outstanding','Call the TSLO and ask them to reach the TLO','Begin staging based on the last known schedule, just in case'],ans:1,exp:'At 16:50 you do two things simultaneously: one final direct attempt to reach the TLO (call, not message) and notify your Supervisor that confirmation has not happened. Your Supervisor needs to know before the 17:00 deadline so they can intervene through their channels if the TLO is unreachable.'},
{q:'TMM Lite is not loading on your tablet 30 minutes before a match-day convoy. What do you do?',opts:['Start the operation — you can manage without TMM for one movement','Contact your Supervisor immediately — you are not operationally ready without TMM Lite','Use the FIFA Drive App on your phone as a substitute','Ask a driver to share their FIFA Drive App screen with you'],ans:1,exp:'A non-functional TMM Lite means you have no real-time vehicle visibility and cannot make schedule changes. This is a pre-shift device failure. Notify Supervisor immediately — they may need to provide a replacement device, escalate the tech issue, or temporarily reassign oversight.'},
{q:'PMAs must submit accurate flight information for airport services to be activated at least how far in advance?',opts:['7 days','14 days','30 days','60 days'],ans:2,exp:'PMAs must submit accurate flight information at least 30 days before arrival. Late submissions may result in reduced airport service levels — the AND team and airport authority cannot prepare without lead time.'},
{q:'Which description best matches what a driver sees in the FIFA Drive App?',opts:['Full TMM view including all team vehicles and routes','Shift acceptance, their assigned job, pick-up point, destination, and navigation route','Only the daily run sheet with departure times','Live GPS positions of all convoy vehicles'],ans:1,exp:'Drivers see exactly what they need to execute their job: shift acceptance, their specific assigned movement, where to pick up, where to go, and navigation. They don\'t see the full operation — just their piece of it. This is why TMM accuracy matters: it\'s the only information source the driver has.'},
{q:'IFES refreshes into TMM every 15 minutes. A flight shows an ETA of 18:30 in TMM. It\'s now 16:45. When should you check TMM again for an updated ETA?',opts:['Right before staging — around 17:30','Only once at 17:00 — one check is enough','Every 15 minutes from now until the team lands','Only if the TLO calls you with an update'],ans:0,exp:'You should be monitoring TMM actively in the 15-minute refresh windows leading up to staging. For a 18:30 ETA, a check around 17:30 (60 min before staging) is the critical check — are vehicles in position at 17:30? Has the ETA shifted? You should also check at 18:00 and 18:15 as the arrival approaches.'},

content:()=>`
<div class="sb"><h2>The Data Flow: IFES → TMM → Drivers</h2>
<div class="flow">
<div class="fs"><div class="fn">1</div><div><div class="ft">TLO confirms schedule in IFES by 17:00 (day prior)</div><div class="fd">This is the trigger for everything downstream. Without it, fleet staging cannot happen. Verbal confirmation is not sufficient.</div></div></div>
<div class="fs"><div class="fn">2</div><div><div class="ft">IFES auto-refreshes flight data into TMM every 15 minutes</div><div class="fd">Flight status, ETA changes, gate information — flows automatically. Monitor TMM actively during staging windows.</div></div></div>
<div class="fs"><div class="fn">3</div><div><div class="ft">TC monitors TMM Lite on tablet throughout shift</div><div class="fd">Real-time vehicle positions, schedule adherence, last-minute changes. Every change you make flows immediately to drivers.</div></div></div>
<div class="fs"><div class="fn">4</div><div><div class="ft">Drivers receive jobs and updates via FIFA Drive App</div><div class="fd">Integrated with TMM. Every change you make in TMM is what the driver sees on their phone. There is no other source.</div></div></div>
</div></div>
<div class="sb"><h2>TMM Access Levels</h2>
<table class="dt"><thead><tr><th>User</th><th>Tool</th><th>What They See / Can Do</th></tr></thead><tbody>
<tr><td>Event Managers</td><td>Full TMM</td><td>All panels, all teams, edit everything, manage user access rights</td></tr>
<tr><td>TCs</td><td>TMM Lite (tablet)</td><td>Vehicle locations, routes, journey times, vehicles, drivers, bookings, last-minute changes</td></tr>
<tr><td>Drivers</td><td>FIFA Drive App</td><td>Shift acceptance, assigned job, pick-up point, destination, navigation</td></tr>
<tr><td>Clients/Passengers</td><td>Client view</td><td>Booking confirmation, pick-up point, destination</td></tr>
</tbody></table></div>
<div class="sb"><h2>The 17:00 Rule in Practice</h2>
<div class="callout-d"><div class="cl">Non-negotiable daily rule</div><p>The team schedule must be confirmed via the TLO in IFES by <strong>17:00 local time on the day before</strong> transport services are required. Fleet scheduling, driver briefing, and staging cannot happen without it. Verbal confirmation is not sufficient — it must be in IFES.</p></div>
<div class="sc-box"><div class="sc-hd">Scenario — cascade of a missed confirmation</div>
<div class="sc-body">It is 17:30. Tomorrow is MD-1. The TLO has not confirmed in IFES despite two messages from you at 16:00 and 16:45. Your Supervisor was notified at 16:50 and has been trying to reach TSV. It is now 17:30 and still nothing. Meanwhile, your drivers are asking you for tomorrow's schedule for their FIFA Drive App briefing.</div>
<div class="sc-q">What do you do with your drivers right now?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">Brief drivers on yesterday's schedule as a best guess — it's usually similar.</div>
<div class="sc-c" onclick="sc(this,'r')">Do not brief drivers with unconfirmed data. Hold the driver briefing until the schedule is confirmed in IFES. Continue escalation through your Supervisor. Inform drivers that the briefing is delayed pending schedule confirmation and give them a latest time you'll update them.</div>
<div class="sc-c" onclick="sc(this,'w')">Brief drivers on the schedule, then update them if it changes — better some information than none.</div>
<div class="sc-c" onclick="sc(this,'w')">Brief drivers verbally and update TMM later when IFES confirms.</div>
</div>
<div class="sc-exp">Briefing drivers on unconfirmed data creates a worse problem: now you have drivers with wrong information in the FIFA Drive App and a confirmed schedule that may contradict it. Hold the briefing, set a clear latest time for the update ("I'll have your briefing by 19:00 at the latest"), and keep escalating. Your Supervisor needs to solve the IFES confirmation problem — your job is to stay operationally ready without creating false certainty in the driver chain.</div>
</div></div>`},

{q:'Before assuming your shift, you find TMM Lite won\'t load on your tablet. What do you do?',opts:['Start the shift and troubleshoot at the first break','Immediately notify your Supervisor — you are not operationally ready','Use the FIFA Drive App on your personal phone instead','Try restarting the tablet twice, then proceed regardless'],ans:1,exp:'A tablet that fails the pre-shift check means you are not operationally ready. You notify your Supervisor before assuming the shift — not during it. They may need to provide a replacement device or make alternative oversight arrangements.'},
{q:'A driver hasn\'t reported to their start location and it\'s now T-30. What is the correct action?',opts:['Give them another 15 minutes before doing anything','Contact the depot immediately for a replacement and notify your Supervisor','Call the driver and wait for their explanation','Proceed with one fewer vehicle — the convoy can manage'],ans:1,exp:'T-30 is the threshold. If a driver hasn\'t checked in by T-30, contact the depot immediately for a replacement and notify your Supervisor. You cannot stage that vehicle without a confirmed driver. Never deploy to a movement hoping a driver will show — have a confirmed replacement in place first.'},
{q:'Your duty phone has 8% battery at the start of a 12-hour shift. You don\'t have a charger available right now. What do you do?',opts:['Proceed with the shift — 8% may last an hour or two','Source a charger immediately before assuming the shift — a phone that will die mid-shift fails the pre-shift check','Tell drivers to reach you on your personal phone instead','Notify the TLO that your phone is low and ask them to text instead of call'],ans:1,exp:'8% battery at the start of a 12-hour shift is a pre-shift failure. The duty phone must be sufficiently charged to run a full shift. Source a charger before assuming the shift. This is not a "figure it out later" problem — it must be solved before you step into the operational role.'},
{q:'What is the purpose of the daily face-to-face TLO/TSLO briefing?',opts:['To fulfil a FIFA reporting requirement','To confirm today\'s schedule against IFES, discuss concerns, align on convoy timing and escort, and get ahead of the day before the first movement','To receive the TLO\'s approval for all vehicle movements that day','To review the weekly schedule together'],ans:1,exp:'The daily face-to-face briefing is operationally essential — not administrative. You confirm the day\'s schedule, surface any concerns (flagged vehicles, driver issues), align on convoy order and police escort timing, and make sure both the TLO and TSLO have the same information you have. This is how you run ahead of the day instead of reacting to it.'},
{q:'What does "Transport Desk reachable at all times" mean in practice?',opts:['You answer the duty phone during business hours only','The Transport Desk number must be posted in the hotel lobby','The duty phone is answered during every part of your shift — no exceptions, regardless of what else you\'re doing','You respond to messages within 30 minutes during your shift'],ans:2,exp:'If the duty phone rings during a convoy briefing — you answer it. If it rings during a driver debrief — you answer it. There is no moment during your shift when the duty phone is ignored. The Transport Desk being unreachable is an operational failure.'},
{q:'The pre-shift protocol includes 7 steps. What is the correct final step before the first movement?',opts:['Verify all vehicles are fueled and branded','Confirm all drivers have reported to their start locations','Hold the face-to-face morning briefing with TLO and TSLO — confirming the schedule, concerns, and convoy plans','Update TMM with the day\'s schedule'],ans:2,exp:'The 7-step pre-shift protocol concludes with the TLO/TSLO morning briefing. This is the final alignment before movement: all three parties confirm the schedule, discuss concerns, and agree on the day\'s execution. It happens before the first vehicle moves.'},
],
content:()=>`
<div class="sb"><h2>Your Two Devices</h2>
<div class="ig">
<div class="ic"><div class="ic-l">Tablet — TMM Lite</div><div class="ic-v">Monitors vehicle movements, operational updates, schedule changes in real time. Must be on and accessible throughout your entire shift. Never let it die during a movement.</div></div>
<div class="ic"><div class="ic-l">Duty Phone — Operational Comms</div><div class="ic-v">Dedicated operational line for Transport leadership, TLO, TSLO, drivers, depot. Answered at all times during your shift without exception.</div></div>
</div></div>
<div class="sb"><h2>Full Pre-Shift Protocol — 7 Steps</h2>
<div class="flow">
<div class="fs"><div class="fn">1</div><div><div class="ft">Device readiness check</div><div class="fd">Both devices: powered on, sufficiently charged, connectivity verified, TMM Lite loaded, key contacts saved. If either fails — notify Supervisor before assuming shift.</div></div></div>
<div class="fs"><div class="fn">2</div><div><div class="ft">Handover review</div><div class="fd">Read previous shift's notes. Any outstanding TLO/TSLO requests? Vehicles flagged? Open issues from overnight?</div></div></div>
<div class="fs"><div class="fn">3</div><div><div class="ft">IFES/TMM check</div><div class="fd">Review today's confirmed schedule in TMM. Check IFES for any overnight flight updates or ETA changes. Flag discrepancies to Supervisor immediately.</div></div></div>
<div class="fs"><div class="fn">4</div><div><div class="ft">Vehicle inspection</div><div class="fd">All vehicles: clean, fueled, functioning, branded if applicable, COM VAPP displayed lower right windscreen. Flag issues to depot immediately.</div></div></div>
<div class="fs"><div class="fn">5</div><div><div class="ft">Driver check-in verification</div><div class="fd">Confirm all drivers have reported to their start location at least 30 minutes before shift start. Any driver not checked in by T-30 → depot + Supervisor immediately.</div></div></div>
<div class="fs"><div class="fn">6</div><div><div class="ft">Driver briefing</div><div class="fd">All drivers briefed: today's schedule, convoy order, approved route, contingencies. Every driver's duty phone confirmed working.</div></div></div>
<div class="fs"><div class="fn">7</div><div><div class="ft">TLO/TSLO morning briefing (face-to-face)</div><div class="fd">Confirm schedule, surface concerns, align on convoy timing and police escort. Before the first vehicle moves.</div></div></div>
</div></div>
<div class="sb"><h2>Shift Close Protocol</h2>
<div class="flow">
<div class="fs"><div class="fn">1</div><div><div class="ft">Driver check-out</div><div class="fd">All drivers confirmed completed and checked out in TMM. Issues documented.</div></div></div>
<div class="fs"><div class="fn">2</div><div><div class="ft">Vehicle log</div><div class="fd">All vehicles returned to staging, fueled for next shift. Maintenance issues communicated to depot.</div></div></div>
<div class="fs"><div class="fn">3</div><div><div class="ft">Daily report submitted</div><div class="fd">Operations performance, incidents, driver concerns, schedule deviations, escalations. Submitted to Supervisor before leaving. Every shift. Not only when incidents occur.</div></div></div>
<div class="fs"><div class="fn">4</div><div><div class="ft">Handover notes prepared</div><div class="fd">Outstanding requests, flagged vehicles, open issues, schedule changes. Incoming TC should have zero surprises.</div></div></div>
<div class="fs"><div class="fn">5</div><div><div class="ft">IFES check for tomorrow</div><div class="fd">Has TLO confirmed? If not — send reminder (they have until 17:00). If past 17:00 unconfirmed — alert Supervisor before closing shift.</div></div></div>
</div></div>`},

{week:1,day:8,type:'lesson',title:'PMAs, TLO & TSLO — Stakeholder Protocols',tag:'Week 2 · Day 3',time:'~45 min',
why:'The TLO and TSLO are your two most critical daily relationships. Understanding their roles, your obligations to each, and what happens when alignment breaks down is the difference between a smooth operation and a chaotic one.',
obj:['Know PMA delegation numbers and F&F boundary','Understand TLO responsibilities and daily briefing protocol','Understand TSLO authority and what you always defer to them'],
takes:['Average PMA delegation: 68 people (23–26 players + 29–32 officials). Total: 3,264 across all 48 PMAs.','<strong>F&F are NOT served by FIFA transport. No Rate Card for F&F.</strong> F&F receive VAPPs only (10 car + 5 bus per team per match) for self-arranged parking.','TLO: 1 per PMA, present from arrival to final departure. Confirms IFES by 17:00. Attends daily briefing. Informs TC of all changes.','<strong>Police escort window: MD-5 through MD+2.</strong> Outside this window requires Rate Card purchase for escort.','TSLO: police escort, bus sweep authorization, convoy security, route security. All security and routing decisions defer to TSLO.','The bus sweep must be complete and TSLO-cleared <strong>before the team boards</strong>. Not during boarding — before.'],
quiz:[
{q:'A TLO asks you to arrange Rate Card vehicles for "the team\'s support staff who aren\'t on the official delegation list." What do you do?',opts:['Arrange the vehicles — TLO authority covers support staff','Check if the support staff are accredited before deciding','Decline — Rate Card is exclusively for the official delegation. If they\'re not on the delegation list, they are not eligible.','Ask your Supervisor before answering'],ans:2,exp:'Rate Card vehicles are reserved for the official delegation. If someone is not on the official delegation list, they are not eligible for FIFA transport services. This is not a gray area. Politely decline and redirect the TLO to Team Services (TSV) for clarification.'},
{q:'The police escort is provided without charge for which window?',opts:['MD-3 through MD+1','MD-5 through MD+2','First arrival to final departure','MD-1 through MD+1'],ans:1,exp:'MD-5 through MD+2 is the complimentary police escort window. Outside this window — including any pre-tournament arrival before MD-5 or post-tournament activity after MD+2 — requires a Rate Card purchase for escort.'},
{q:'The bus sweep must be completed when, relative to team boarding?',opts:['During boarding — security checks passengers as they step on','30 minutes before departure, regardless of boarding status','Before the team boards — bus cannot load until TSLO clears it','At any point in the 60 minutes before departure'],ans:2,exp:'The bus sweep is completed before the team boards. The sweep is a security check — the bus must be cleared before anyone steps on it. You coordinate the sweep timing with the TSLO, and you do not begin boarding until TSLO gives clearance.'},
{q:'During a convoy, a driver suggests using a faster local road to avoid a 15-minute traffic delay. What is your response?',opts:['Approve it — driver knows the roads and the time saving is meaningful','Ask the TLO if they approve the alternate route','Tell the driver to stay on the FIFA-approved route. Any deviation requires TSLO clearance.','Use your judgment based on the severity of the delay'],ans:2,exp:'No deviation from FIFA-approved routes is permitted without TSLO clearance — not for traffic, not for time pressure, not for any reason. Routes are pre-validated by FIFA SEC. A driver\'s local knowledge does not override this.'},
{q:'How many F&F car VAPPs does each team receive per match?',opts:['5','10','15','20'],ans:1,exp:'Each team receives 10 F&F car VAPPs and 5 F&F bus VAPPs per match. These allow self-arranged F&F vehicles to park in designated areas outside the stadium security perimeter. F&F do not receive transport — only parking access.'},
{q:'The daily face-to-face briefing with TLO and TSLO must happen:',opts:['Weekly, before each Knowledge Check period','Before every match day only','Every day, before the first movement','Whenever a new movement type is planned'],ans:2,exp:'Every day, before the first movement. This is non-negotiable and non-optional — including on rest days, travel days, and training-only days. The daily briefing is how you stay ahead of the operation instead of reacting to it.'},
{q:'Your TSLO is unreachable at 08:30. The team departs TBCH for VSTH at 10:00. MD-1 movement. What is your action?',opts:['Proceed at 10:00 — TLO has confirmed and drivers are ready','Wait until 09:45 and try TSLO one more time, then proceed','Escalate to Supervisor immediately at 08:30 — TSLO alignment is required before any MD-1 movement proceeds','Ask the TLO if they can contact the TSLO on your behalf'],ans:2,exp:'You escalate immediately at 08:30 — not at 09:45. Your Supervisor has the authority and channels to reach the TSLO through official routes. You do not proceed with an MD-1 movement without TSLO alignment, regardless of how confirmed everything else is. An uncleared bus sweep and unconfirmed escort timing is an unacceptable risk.'},
{q:'How many total PMA delegation members does the DSLA estimate across all 48 teams?',opts:['2,400','2,880','3,264','3,600'],ans:2,exp:'Average delegation: 68 per team × 48 teams = 3,264. This total is used for planning purposes across transport, accommodation, accreditation, and catering.'},
],
content:()=>`
<div class="sb"><h2>The PMA Delegation</h2>
<table class="dt"><thead><tr><th>Category</th><th>Count per Team</th><th>Total (48 Teams)</th></tr></thead><tbody>
<tr><td>Players</td><td>23–26</td><td>~1,200</td></tr>
<tr><td>Team officials</td><td>29–32</td><td>~1,440</td></tr>
<tr><td>Average delegation total</td><td>~68</td><td>3,264</td></tr>
</tbody></table>
<div class="callout"><div class="cl">F&F — the hard boundary</div><p>Family & Friends are not part of the official delegation. They receive no transport services from FIFA. Rate Card is not available for F&F. Their only FIFA-provided benefit is a VAPP for parking outside the stadium security perimeter (10 car + 5 bus per team per match). This boundary must be held clearly and politely from Day 1.</p></div>
</div>
<div class="sb"><h2>The TLO — Your Daily Counterpart</h2>
<div class="two-col">
<div class="rc"><h4>TLO covers</h4><ul>
<li>Team arrival and departure</li>
<li>Confirms schedule in IFES by 17:00 daily</li>
<li>All daily team activities and training</li>
<li>MD-1 and match day activities</li>
<li>Escalates to TSV for cross-functional issues</li>
<li>Informs TC of any changes affecting transport</li>
</ul></div>
<div class="rc"><h4>Your obligations to TLO</h4><ul>
<li>Daily face-to-face briefing — before first movement</li>
<li>Real-time updates on fleet or schedule changes</li>
<li>Resolve transport issues together</li>
<li>Brief TLO on any driver or vehicle issues</li>
<li>Escalate what you cannot resolve jointly</li>
</ul></div>
</div></div>
<div class="sb"><h2>The TSLO — The Security Authority</h2>
<div class="two-col">
<div class="rc"><h4>TSLO covers</h4><ul>
<li>Police escort coordination (MD-5 to MD+2)</li>
<li>Convoy security composition</li>
<li>Bus sweep authorization — required before boarding</li>
<li>Route security validation</li>
<li>Real-time incident response</li>
<li>All security decisions — no exceptions</li>
</ul></div>
<div class="rc"><h4>Your obligations to TSLO</h4><ul>
<li>Align on convoy order and timing before every movement</li>
<li>Coordinate the bus sweep window — TSLO clears it</li>
<li>Loop TSLO into all communication channels</li>
<li>Relay all delays and disruptions immediately</li>
<li>Defer all security and routing decisions — zero exceptions</li>
</ul></div>
</div>
<div class="callout-d"><div class="cl">Security incident protocol — memorize this</div><p>In any security situation: <strong>(1) Stop movement. (2) Secure the team in the vehicle. (3) Contact TSLO.</strong> In that order. Every time. No schedule pressure, no TLO request, no client preference overrides team safety. You have zero independent security decision authority.</p></div>
</div>
<div class="sb"><h2>Scenario Practice</h2>
<div class="sc-box"><div class="sc-hd">The TSLO disagreement</div>
<div class="sc-body">It's match day. Your team is departing TBCH for the stadium. The TLO tells you the team wants to stop at a specific gas station route slightly off the confirmed FIFA convoy route — a player wants to pick up something. It will add about 8 minutes. The TSLO has already approved the current route and the police escort is staged.</div>
<div class="sc-q">What is your response?</div>
<div class="sc-opts">
<div class="sc-c" onclick="sc(this,'w')">Approve the stop — 8 minutes is minor and keeping the team happy is the priority.</div>
<div class="sc-c" onclick="sc(this,'w')">Ask the TLO to get verbal confirmation from the team captain and proceed if they agree.</div>
<div class="sc-c" onclick="sc(this,'r')">Inform the TLO that any route change requires TSLO clearance. Immediately ask the TSLO if the stop can be accommodated. If TSLO approves, proceed. If not — politely explain to the TLO that security constraints prohibit the detour.</div>
<div class="sc-c" onclick="sc(this,'w')">Allow the stop but have a driver wait outside while the player runs in quickly.</div>
</div>
<div class="sc-exp">Any deviation from a FIFA-approved route requires TSLO clearance — this includes a "minor" stop. The TSLO must approve it because they need to communicate with the police escort, adjust staging timing, and assess the security implications of stopping at an unplanned location. You are the conduit here: hear the TLO's request, immediately ask the TSLO, and communicate the answer. Never approve a route change independently.</div>
</div></div>`},

{week:1,day:9,type:'recap',title:'Week 2 Recap — Systems & Stakeholders',tag:'Week 2 · Recap Day',recapWeek:1,

'IFES → TMM every 15 min. TLO confirms by 17:00 day prior. 30-day advance flight submission required for airport services.',
'TMM = single source of truth. Verbal changes don\'t exist operationally until updated in TMM.',
'Two devices every shift: tablet (TMM Lite) + duty phone. Both pass the pre-shift check before assuming the shift.',
'Drivers report 30 min before shift start. Not checked in by T-30 → depot + Supervisor immediately.',
'Average PMA delegation: 68 people. F&F: no transport, no Rate Card — VAPPs only (10 car + 5 bus per match).',
'Police escort window: MD-5 to MD+2. Bus sweep before boarding — TSLO clears it. Routing changes require TSLO clearance, always.',
'Daily face-to-face TLO/TSLO briefing before every first movement — without exception.',
],
quiz:[
{q:'A schedule change was discussed verbally with the TLO. Is it operational?',opts:['Yes — TLO authority is sufficient','Yes — if it was confirmed on WhatsApp','No — changes are only operational once updated in TMM','Only if the Supervisor was informed'],ans:2,exp:'Verbal confirmation does not exist operationally. It must be in TMM. Drivers use the FIFA Drive App which draws data from TMM — a verbal change that isn\'t updated means drivers have wrong information.'},
{q:'The bus sweep must happen:',opts:['During boarding','Before the team boards — TSLO must clear before loading begins','30 minutes before departure regardless of boarding status','After all passengers are seated and counted'],ans:1,exp:'Bus sweep is completed before the team boards. TSLO clearance = boarding begins. No exceptions.'},
{q:'Your TSLO is unreachable at 08:30 before a 10:00 MD-1 departure. You should:',opts:['Proceed — TLO confirmed and drivers are ready','Wait until 09:30 and try TSLO again before deciding','Escalate to Supervisor immediately — TSLO alignment is required before this movement proceeds','Brief drivers and hold departure until TSLO responds'],ans:2,exp:'Immediate escalation to Supervisor at 08:30. Not at 09:30. Your Supervisor has channels to reach the TSLO through official routes. Do not wait to escalate on an MD-1 departure.'},
{q:'It is 17:15 and the TLO has not confirmed in IFES. You should:',opts:['Wait until morning — there\'s nothing to do now','Stage vehicles based on yesterday\'s schedule','Ensure your Supervisor has been notified and continue following up with TLO','Send one final message to TLO and go off duty'],ans:2,exp:'Your Supervisor should have been notified before 17:00. At 17:15 they should be actively working the issue. Continue to be available and responsive. Do not stage on unconfirmed data.'},
],
scenarios:[
{title:'MD-1 morning — everything at once',body:'It\'s MD-1, 07:00. You start your shift and find: (1) TMM Lite is showing yesterday\'s data and won\'t refresh. (2) One driver hasn\'t checked in — it\'s T-35. (3) The TLO calls to say the team wants to add a stop at a sponsor location on the route to the VSTH, not on the approved route. Team departs at 10:00.',choices:['Handle each issue one at a time — TMM first, then driver, then TLO route request','Escalate TMM to Supervisor, contact depot for driver replacement, and tell TLO any route change requires TSLO clearance — all simultaneously, right now','Focus on the TLO route request first — that\'s the most complex issue','Fix the driver issue first, then address TMM and TLO'],correct:1,exp:'All three are happening simultaneously and all three require immediate action. You notify Supervisor of the TMM failure (they need to know). You contact depot for a driver replacement (T-35 means already past threshold). And you tell the TLO clearly: any route change needs TSLO clearance, and you\'ll get TSLO\'s answer immediately. Handling them sequentially risks one or more not being resolved before the 10:00 departure.'},
]},
